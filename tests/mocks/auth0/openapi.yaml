002Fidentity-labs\u002Fidentity-lab-2-calling-api\u002Fidentity-lab-2-exercise-3"}]},{"title":"Lab 3: Mobile Native App","url":"\u002Fdocs\u002Fidentity-labs\u002Flab-3-mobile-native-app","children":[{"title":"Exercise 1","url":"\u002Fdocs\u002Fidentity-labs\u002Flab-3-mobile-native-app\u002Fidentity-lab-3-exercise-1"},{"title":"Exercise 2","url":"\u002Fdocs\u002Fidentity-labs\u002Flab-3-mobile-native-app\u002Fidentity-lab-3-exercise-2"},{"title":"Exercise 3","url":"\u002Fdocs\u002Fidentity-labs\u002Flab-3-mobile-native-app\u002Fidentity-lab-3-exercise-3"}]},{"title":"Lab 4: Single Page App","url":"\u002Fdocs\u002Fidentity-labs\u002Flab-4-single-page-app","children":[{"title":"Exercise 1","url":"\u002Fdocs\u002Fidentity-labs\u002Flab-4-single-page-app\u002Fidentity-lab-4-exercise-1"},{"title":"Exercise 2","url":"\u002Fdocs\u002Fidentity-labs\u002Flab-4-single-page-app\u002Fidentity-lab-4-exercise-2"}]}]}]}},"cards":null,"glossary":{"terms":[{"id":"access-token","title":"Access Token","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003ECredential that can be used by an application to access an API. It informs the API that the bearer of the token has been authorized to access the API and perform specific actions specified by the scope that has been granted. An Access Token can be in any format, but two popular options include opaque strings and JSON Web Tokens (JWT). They should be transmitted to the API as a Bearer credential in an HTTP Authorization header.\u003C\u002Fp\u003E","short":"\u003Cp\u003EAuthorization credential, in the form of an opaque string or JWT, used to access an API.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["access token","access tokens"]},{"id":"account linking","title":"Account Linking","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EConnecting user accounts across multiple platforms to allow users access to more than one resource or application by providing credentials one time.\u003C\u002Fp\u003E","short":"\u003Cp\u003EConnecting user accounts across multiple platforms.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["account linking"]},{"id":"actions","title":"Actions","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003ESecure, tenant-specific, versioned functions written in Node.js that execute at certain points during the Auth0 runtime. Actions are used to customize and extend Auth0's capabilities with custom logic.\u003C\u002Fp\u003E","short":"\u003Cp\u003ESecure, tenant-specific, versioned functions written in Node.js that execute at certain points during the Auth0 runtime.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["actions","action"]},{"id":"adaptive-multi-factor-authentication","title":"Adaptive Multi-factor Authentication","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EMulti-factor authentication (MFA) that is only triggered for users when an attempted login is determined to be a low confidence login. With Adaptive MFA, Auth0 triggers MFA only when needed to add friction for bad actors while keeping the login experience unchanged for good actors.\u003C\u002Fp\u003E","short":"\u003Cp\u003EMulti-factor authentication (MFA) that is only triggered for users when an attempted login is determined to be a low confidence login.   \u003C\u002Fp\u003E","automate":true,"automaticTerms":["adaptive multi-factor authentication","adaptive MFA","adaptive multifactor authentication"]},{"id":"application","title":"Application","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EYour software that relies on Auth0 for authentication and identity management. Auth0 supports single-page, regular web, native, and machine-to-machine applications.\u003C\u002Fp\u003E","short":"\u003Cp\u003EYour software that relies on Auth0 for authentication and identity management. Auth0 supports single-page, regular web, native, and machine-to-machine applications.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["application","applications"]},{"id":"attack-protection","title":"Attack Protection","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EFeatures that Auth0 provides to detect and mitigate attacks, including brute-force protection, suspicious IP throttling, breached password detection, bot detection, and adaptive multi-factor authentication.\u003C\u002Fp\u003E","short":"\u003Cp\u003EFeatures that Auth0 provides to detect and mitigate attacks, including brute-force protection, suspicious IP throttling, breached password detection, bot detection, and adaptive multi-factor authentication.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["attack protection"]},{"id":"audience","title":"Audience","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EUnique identifier of the audience for an issued token, identified within a JSON Web Token as the \u003Cb\u003Eaud\u003C\u002Fb\u003E claim. The audience value is either the application (\u003Ccode\u003EClient ID\u003C\u002Fcode\u003E) for an ID Token or the API that is being called (\u003Ccode\u003EAPI Identifier\u003C\u002Fcode\u003E) for an Access Token. At Auth0, the Audience value sent in a request for an Access Token dictates whether that token is returned in an opaque or JWT format.\u003C\u002Fp\u003E","short":"\u003Cp\u003EUnique identifier of the audience for an issued token. Named \u003Cb\u003Eaud\u003C\u002Fb\u003E in a token, its value contains the ID of either an application (\u003Ccode\u003EClient ID\u003C\u002Fcode\u003E) for an ID Token or an API (\u003Ccode\u003EAPI Identifier\u003C\u002Fcode\u003E) for an Access Token.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["audience"]},{"id":"auth0-dashboard","title":"Auth0 Dashboard","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EAuth0’s primary administrator interface in which you can register your application or API, connect to a user store or another identity provider, and configure your Auth0 services.\u003C\u002Fp\u003E","short":"\u003Cp\u003EAuth0's main product to configure your services.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["auth0 dashboard"]},{"id":"authentication-device","title":"Authentication Device","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EThe device on which the user will authenticate and grant consent in the Client-Initiated Backchannel Authentication Flow.\u003C\u002Fp\u003E","short":"\u003Cp\u003EThe device on which the user will authenticate and grant consent in the Client-Initiated Backchannel Authentication Flow.\u003C\u002Fp\u003E","automate":false},{"id":"authentication-server","title":"Authentication Server","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EServer that confirms or denies a user’s identity. An authentication server does not limit the actions or resources available to the user (although it can provide context for this purpose).\u003C\u002Fp\u003E","short":"\u003Cp\u003EServer that confirms or denies a user’s identity.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["authentication server","authentication servers"]},{"id":"authorization-code","title":"Authorization Code","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003ERandom string generated by the authorization server and returned to the application as part of the authorization response. The authorization code is relatively short-lived and is exchanged for an Access Token at the token endpoint when using the Authorization Code Flow (either with or without Proof Key for Code Exchange (PKCE)).\u003C\u002Fp\u003E","short":"\u003Cp\u003ERandom string generated by the authorization server and returned to the application as part of the authorization response when using the Authorization Code Flow (either with or without PKCE).\u003C\u002Fp\u003E","automate":false,"automaticTerms":["authorization code","auth code","authorization codes","auth codes"]},{"id":"authorization-flow","title":"Authorization Flow","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EAnother name for Authorization Grants outlined in OAuth 2.0. Authorization flows are the workflows a resource (an application or an AIP) uses to grant requestors access. Based on the type of technology (for example, if an application can store a Client Secret) and the type of requestor, resource owners can use Authorization Code Flow, Proof of Key Code Exchange (PKCE), Resource Owner Password Credential (ROPG), Implicit, or Client Credential.\u003C\u002Fp\u003E","short":"\u003Cp\u003EAuthorization grant (or workflow) specified in the OAuth 2.0 framework.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["authorization flow","authorization flows"]},{"id":"authorization-server","title":"Authorization Server","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003ECentralized server that contributes to defining the boundaries of a user’s access. For example, your authorization server can control the data, tasks, and features available to a user. An authorization server does not authenticate users. It’s the role of the authentication server to verify a user’s identity.\u003C\u002Fp\u003E","short":"\u003Cp\u003ECentralized server that contributes to defining the boundaries of a user’s access. For example, your authorization server can control the data, tasks, and features available to a user.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["authorization server","authorization servers"]},{"id":"bad-actors","title":"Bad Actors","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EAlso known as threat actors. Entity (a person or group) that poses a threat to the business or environment with the intention to cause harm. Harm can constitute physical or cyber damages, from breaking into a data center to hacking into systems with stolen credentials.\u003C\u002Fp\u003E","short":"\u003Cp\u003EEntity (a person or group) that poses a threat to the business or environment with the intention to cause harm.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["bad actors","bad actor"]},{"id":"beta","title":"Beta","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EProduct release stage during which the referenced feature or behavior is provided to subscribers to give them time to explore and adopt new product capabilities while providing final feedback prior to a General Availability (GA) release. Functionality is code-complete, stable, useful in a variety of scenarios, and believed to meet or almost meet quality expectations for a GA release. Beta releases may be restricted to a select number of subscribers (private) or open to all subscribers (public).\u003C\u002Fp\u003E","short":"\u003Cp\u003EProduct release stage during which subscribers can explore and adopt new product capabilities while providing final feedback prior to a General Availability (GA) release. Beta releases may be public or private.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["beta","betas"]},{"id":"block-unblock","title":"Block\u002FUnblock Users","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003ERemoving or restoring a requestor's access to a resource. Refers to the features from Auth0's Attack Protection suite: Breached Password Detection, Brute-Force Protection, and Suspicious IP Throttling. Each service assesses login\u002Fsign-up trends and blocks IP addresses associated with suspicious activity.\u003C\u002Fp\u003E","short":"\u003Cp\u003ERemoving or restoring a requestor's access to a resource.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["block\u002Funblock users","block\u002Funblock user"]},{"id":"bot-detection","title":"Bot Detection","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EForm of attack protection in which Auth0 blocks suspected bot traffic by enabling a CAPTCHA during the login process.\u003C\u002Fp\u003E","short":"\u003Cp\u003EForm of attack protection in which Auth0 blocks suspected bot traffic by enabling a CAPTCHA during the login process.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["bot detection"]},{"id":"breached-password-detection","title":"Breached Password Detection","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EForm of attack protection in which Auth0 notifies your users if they use a username\u002Fpassword combination that has been compromised in a data leak on a third-party website or app.\u003C\u002Fp\u003E","short":"\u003Cp\u003EForm of attack protection in which Auth0 notifies your users if they use a username\u002Fpassword combination that has been compromised in a data leak on a third-party website or app.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["breached password detection"]},{"id":"breaking-change","title":"Breaking Change","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EChange to the Auth0 platform that, to Auth0's knowledge, will cause failures in the interoperation of the Auth0 platform and customer applications.\u003C\u002Fp\u003E","short":"\u003Cp\u003EChange to the Auth0 platform that, to Auth0's knowledge, will cause failures in the interoperation of the Auth0 platform and customer applications.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["breaking change","breaking changes"]},{"id":"brute-force-protection","title":"Brute-force Protection","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EForm of attack protection that safeguards against brute-force attacks that occur from a single IP address and target a single user account.\u003C\u002Fp\u003E","short":"\u003Cp\u003EForm of attack protection that safeguards against brute-force attacks that occur from a single IP address and target a single user account.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["brute-force protection","brute force protection"]},{"id":"callback","title":"Callback","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EURL to which Auth0 sends its response after authentication. It is often the same URL to which a user is redirected after authentication.\u003C\u002Fp\u003E","short":"\u003Cp\u003EURL to which Auth0 sends its response after an API call and sometimes where a user is redirected after authentication.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["callback","callbacks"]},{"id":"claim","title":"Claim","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EAttribute packaged in a security token which represents a claim that the provider of the token is making about an entity.\u003C\u002Fp\u003E","short":"\u003Cp\u003EAttribute packaged in a security token which represents a claim that the provider of the token is making about an entity.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["claim","claims"]},{"id":"client-id","title":"Client ID","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EIdentification value assigned to your application after registration. This value is used in conjunction with other third-party services and can be found in \u003Cb\u003EAuth0 Dashboard\u003C\u002Fb\u003E &gt; \u003Cb\u003EApplication Settings\u003C\u002Fb\u003E.\u003C\u002Fp\u003E","short":"\u003Cp\u003EIdentification value given to your registered resource from Auth0.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["client id","client ids"]},{"id":"client-secret","title":"Client Secret","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003ESecret used by a client (application) to authenticate with the Authorization Server; it should be known to only the client and the Authorization Server and must be sufficiently random to not be guessable.\u003C\u002Fp\u003E","short":"\u003Cp\u003ESecret used by a client (application) to authenticate with the Authorization Server; it should be known to only the client and the Authorization Server and must be sufficiently random to not be guessable.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["client secret","client secrets"]},{"id":"confidential-client","title":"Confidential Client","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EAccording to the OAuth 2.0 protocol, clients (applications) can be classified as either confidential or public depending on whether or not they are able to hold credentials (such as a client ID and secret) securely. Confidential clients can hold credentials in a secure way without exposing them to unauthorized parties and require a trusted backend server to do so. They can use grant types that require them to authenticate by specifying their client ID and secret when calling the token endpoint and can have tokens issued to them that have been signed either symmetrically or asymmetrically.\u003C\u002Fp\u003E","short":"\u003Cp\u003EA client (application) that can hold credentials securely by using a trusted backend server. Examples include a web application with a secure backend and a machine-to-machine (M2M) application.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["confidential client","confidential clients"]},{"id":"confused-deputy","title":"Confused Deputy","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003ESituation in which an attacker tricks a client or service into performing an action on their behalf.\u003C\u002Fp\u003E","short":"\u003Cp\u003ESituation in which an attacker tricks a client or service into performing an action on their behalf.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["confused deputy","confused deputies"]},{"id":"connection","title":"Connection","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003ERelationship between Auth0 and the sources of users for your applications. Examples include identity providers (such as Google or Active Directory), passwordless authentication methods, or user databases.\u003C\u002Fp\u003E","short":"\u003Cp\u003ERelationship between Auth0 and the sources of users for your applications.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["connection","connections"]},{"id":"consumption-device","title":"Consumption Device","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EThe device that helps the user consume a service in the Client-Initiated Backchannel Authentication Flow. \u003C\u002Fp\u003E","short":"\u003Cp\u003EThe device that helps the user consume a service in the Client-Initiated Backchannel Authentication Flow. \u003C\u002Fp\u003E","automate":false},{"id":"custom-domain","title":"Custom Domain","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EThird-party domain with a specialized, or vanity, name. Also known as a CNAME.\u003C\u002Fp\u003E","short":"\u003Cp\u003EThird-party domain with a specialized, or vanity, name.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["custom domain","custom domains"]},{"id":"deprecation","title":"Deprecation","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EProduct release stage indicating that the referenced feature or behavior is not supported for use by new subscribers, is not actively being enhanced, and is being only minimally maintained. Tenants using the feature or behavior at the time of deprecation will continue to have access.\u003C\u002Fp\u003E","short":"\u003Cp\u003EProduct release stage indicating that the referenced feature or behavior is not supported for use by new subscribers, is not actively being enhanced, and is being only minimally maintained.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["deprecation","deprecations"]},{"id":"digital-identity","title":"Digital Identity","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003ESet of attributes that define a particular user in the context of a function which is delivered by a particular application.\u003C\u002Fp\u003E","short":"\u003Cp\u003ESet of attributes that define a particular user in the context of a function which is delivered by a particular application.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["digital identity","digital identities"]},{"id":"digital-signature","title":"Digital Signature","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EEncrypted string that protects bits in a token from tampering. If the bits are changed or tampered with, the signature will no longer be able to be verified and it will be rejected.\u003C\u002Fp\u003E","short":"\u003Cp\u003EEncrypted string that protects bits in a token from tampering.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["digital signature","digital signatures"]},{"id":"directory","title":"Directory","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003ECentralized repository of users (the most well-known of which is Active Directory) which centralizes credentials and attributes and makes it unnecessary for each application to have their own local identity setup and pool of users. Allows single sign on to all applications that use the same directory of users.\u003C\u002Fp\u003E","short":"\u003Cp\u003ECentralized repository of users that allows single sign on to all applications that use the same directory.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["directory","directories"]},{"id":"early-access","title":"Early Access","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EProduct release stage during which the referenced feature or behavior is provided to a limited number of subscribers or customer development partners (CDPs) to give them the opportunity to test and provide feedback on future functionality. At this stage, functionality may not be complete, but is ready for validation.\u003C\u002Fp\u003E","short":"\u003Cp\u003EProduct release stage during which the referenced feature or behavior is provided to a limited number of subscribers or customer development partners (CDPs) to give them the opportunity to test and provide feedback on future functionality.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["early access","ea"]},{"id":"end-of-life","title":"End of Life","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EProduct release stage indicating that the referenced feature or behavior is removed from the platform. Continued use of the feature or behavior will likely result in errors. The new behavior will automatically be enabled for Tenants that did not opt in during the migration window.\u003C\u002Fp\u003E","short":"\u003Cp\u003EProduct release stage indicating that the referenced feature or behavior is removed from the platform. Continued use of the feature or behavior will likely result in errors.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["end of life","eol"]},{"id":"end-of-life-date","title":"End of Life Date","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EDate when access to a feature or behavior is removed from the platform. End Of Life Dates can vary between different plan types.\u003C\u002Fp\u003E","short":"\u003Cp\u003EDate when access to a feature or behavior is removed from the platform. End Of Life Dates can vary between different plan types.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["end of life date","end of life dates","eol date"]},{"id":"fine-grained-auth","title":"Fine-grained Authorization (FGA)","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EAuth0’s SaaS product that gives individual users access to specific objects or resources within your application.\u003C\u002Fp\u003E","short":"\u003Cp\u003EAuth0 product allowing individual users access to specific objects or resources.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["fine-grained authorization (fga)","fine-grained authorization","FGA"]},{"id":"flow","title":"Flow","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EProcesses that can be extended using Actions. Each Flow is made up of one or more Triggers and represents the logical pipeline through which information moves during a single point in the Auth0 journey.\u003C\u002Fp\u003E","short":"\u003Cp\u003EProcesses that can be extended using Actions. Each Flow is made up of one or more Triggers and represents the logical pipeline through which information moves during a single point in the Auth0 journey.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["flow","flows"]},{"id":"general-availability","title":"General Availability","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EProduct release stage during which the referenced feature or behavior is fully functional and available to all subscribers (limited by pricing tier) for production use. If a new release replaces an existing feature, Auth0 provides a period of backward compatibility in accordance with our deprecation policy and informs customers so they have time to adopt the new release.\u003C\u002Fp\u003E","short":"\u003Cp\u003EProduct release stage during which the referenced feature or behavior is fully functional and available to all subscribers (limited by pricing tier) for production use.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["general availability","GA"]},{"id":"group","title":"Group","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003ESet of one or more users. In the Auth0 Authorization Extension, use groups to grant access to many users at a time.\u003C\u002Fp\u003E","short":"\u003Cp\u003ESet of one or more users. In the Auth0 Authorization Extension, use groups to grant access to many users at a time.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["group","groups"]},{"id":"id-token","title":"ID Token","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003ECredential meant for the client itself, rather than for accessing a resource. It has a fixed format that clients can parse and validate.\u003C\u002Fp\u003E","short":"\u003Cp\u003ECredential meant for the client itself, rather than for accessing a resource.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["id token","id tokens","identity token","identity tokens"]},{"id":"idp","title":"Identity Provider (IdP)","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EService that stores and manages digital identities. Auth0 supports trusted social, enterprise, and legal identity providers. Auth0 also can function as an identity provider for your applications.\u003C\u002Fp\u003E","short":"\u003Cp\u003EService that stores and manages digital identities.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["identity provider (idp)","identity providers","identity provider","idp","idps","identity providers (idps)"]},{"id":"json-web-token","title":"JSON Web Token (JWT)","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EOpen, industry standard \u003Ca href=\"https:\u002F\u002Ftools.ietf.org\u002Fhtml\u002Frfc7519\" target=\"_blank\" rel=\"noreferrer noopener\"\u003ERFC 7519\u003C\u002Fa\u003E method for representing claims securely between two parties. At Auth0, ID Tokens are always returned in JWT format, and Access Tokens are often in JWT format. You may decode well-formed JWTs at \u003Ca href=\"https:\u002F\u002Fjwt.io\" target=\"_blank\" rel=\"noreferrer noopener\"\u003EJWT.io\u003C\u002Fa\u003E to view their claims.\u003C\u002Fp\u003E","short":"\u003Cp\u003EStandard ID Token format (and often Access Token format) used to represent claims securely between two parties.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["json web token (jwt)","json web token","json web tokens","jwt","jwts","json web tokens (jwts)"]},{"id":"localization","title":"Localization","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EAbility to render the New Universal Login experience into a supported language.\u003C\u002Fp\u003E","short":"\u003Cp\u003EAbility to render the New Universal Login experience into a supported language.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["localization"]},{"id":"lock","title":"Lock","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EAuth0's UI widget for authenticating users. It is ready to go as-is and is the default face of the Classic Universal Login experience. Lock allows you to customize minor behavioral and appearance options, but its primary goal is ease of use.\u003C\u002Fp\u003E","short":"\u003Cp\u003EAuth0's UI widget for authenticating users.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["lock"]},{"id":"management-api","title":"Management API","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EAuth0's API to manage Auth0 services and perform administrative tasks programatically.\u003C\u002Fp\u003E","short":"\u003Cp\u003EA product to allow customers to perform administrative tasks. \u003C\u002Fp\u003E","automate":true,"automaticTerms":["management api"]},{"id":"metadata","title":"Metadata","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EInformation users can update, such as preferences or profile settings. Metadata is added to ID tokens and can be stored in user profiles.\u003C\u002Fp\u003E","short":"\u003Cp\u003EUser information stored in user profiles.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["metadata"]},{"id":"migration","title":"Migration","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EProcess by which a customer moves away from a particular feature or behavior. Migrations should occur during the Deprecation product release stage.\u003C\u002Fp\u003E","short":"\u003Cp\u003EProcess by which a customer moves away from a particular feature or behavior. Migrations should occur during the Deprecation product release stage.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["migration","migrations"]},{"id":"multifactor-authentication","title":"Multi-factor authentication (MFA)","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EAuthentication process that considers multiple factors. Typically at Auth0, the first factor is the standard username\u002Fpassword exchange, and the second is a code or link via email or SMS, a one-time-password via an app such as Authy or Google Authenticator, or a push notification via a phone app such as Guardian or Duo. Using multiple factors allows your account to remain secure if someone captures one or the other factor--acquires your password or steals your phone, for example.\u003C\u002Fp\u003E","short":"\u003Cp\u003EUser authentication process that uses a factor in addition to username and password such as a code via SMS.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["multi-factor authentication (mfa)","multi-factor authentication","multifactor authentication","mfa"]},{"id":"nonce","title":"Nonce","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EArbitrary (often random or pseudo-random) number issued in an authentication protocol that can be used to help detect and mitigate replay attacks using old communications. In other words, the nonce is only issued once, so if an attacker attempts to replay a transaction with a different nonce, its false transaction can be detected more easily.\u003C\u002Fp\u003E","short":"\u003Cp\u003EArbitrary number issued once in an authentication protocol to detect and prevent replay attacks.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["nonce","nonces"]},{"id":"oath2","title":"OAuth 2.0","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EAuthorization framework that defines authorization protocols and workflows. OAuth 2.0 defines roles, authorization grants (or workflows), authorization requests and responses, and token handling. OpenID Connect (OIDC) protocols to verify user identity extends OAuth 2.0.\u003C\u002Fp\u003E","short":"\u003Cp\u003EAuthorization framework that defines authorization protocols and workflows.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["oauth 2.0","oauth"]},{"id":"openid","title":"OpenID","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EOpen standard for authentication that allows applications to verify users are who they say they are without needing to collect, store, and therefore become liable for a user’s login information.\u003C\u002Fp\u003E","short":"\u003Cp\u003EOpen standard for authentication that allows applications to verify users' identities without collecting and storing login information.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["openid"]},{"id":"organizations","title":"Organizations","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EAuth0 product that allows B2B customers to categorize end-users and define specific roles, login experience, and access to resources.\u003C\u002Fp\u003E","short":"\u003Cp\u003EAuth0 product that allows B2B customers to categorize end-users and define specific roles.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["organizations","organization"]},{"id":"passwordless","title":"Passwordless","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EForm of authentication where the first factor is not a password. Instead, it could be a one-time password received by email or SMS, a push notification, or a biometric sensor. Passwordless uses one-time passwords, so users are less susceptible to the typical password-based attacks (e.g., dictionary or credential stuffing) than with traditional username\u002Fpassword logins.\u003C\u002Fp\u003E","short":"\u003Cp\u003EForm of authentication that does not rely on a password as the first factor.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["passwordless"]},{"id":"perimeter","title":"Perimeter","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003ESet of boundaries that encompass a directory, all of its users, and all of the applications which use the directory. In some implementations, this perimeter is a physical location; in others, it is a set of networks or devices connected via VPN.\u003C\u002Fp\u003E","short":"\u003Cp\u003ESet of boundaries that encompass a directory, all of its users, and all of the applications which use the directory.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["perimeter","perimeters"]},{"id":"product-release-stages","title":"Product Release Stages","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EPhases that describe how Auth0 stages, releases, and retires product functionality. Product features may not progress through all release stages, and the time in each stage will vary depending on the scope and impact of the feature.\u003C\u002Fp\u003E","short":"\u003Cp\u003EPhases that describe how Auth0 stages, releases, and retires product functionality.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["product release stages","product release stage"]},{"id":"public-client","title":"Public Client","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EAccording to the OAuth 2.0 protocol, clients (applications) can be classified as either confidential or public depending on whether or not they are able to hold credentials (such as a client ID and secret) securely. Public clients&nbsp;cannot&nbsp;hold credentials securely, so should only use grant types that do not require the use of their client secret. ID Tokens issued to them must be signed asymmetrically using a private key (RS256) and verified using the public key corresponding to the private key used to sign the token.\u003C\u002Fp\u003E","short":"\u003Cp\u003EClient (application) that cannot hold credentials securely. Examples include a native desktop or mobile application and a JavaScript-based client-side web application (such as a single-page app (SPA)).\u003C\u002Fp\u003E","automate":true,"automaticTerms":["public client","public clients"]},{"id":"raw-credential","title":"Raw Credential","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EShared secret or set of information that is agreed upon between the user and the resource that allow the resource to verify the identity of a user.\u003C\u002Fp\u003E","short":"\u003Cp\u003EShared secret or set of information that is agreed upon between the user and the resource that allow the resource to verify the identity of a user.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["raw credential","raw credentials"]},{"id":"refresh-token","title":"Refresh Token","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003ESpecial kind of token that can be used to obtain a renewed Access Token. It is useful for renewing expiring Access Tokens without forcing the user to log in again. Using the Refresh Token, you can request a new Access Token at any time until the Refresh Token is blocklisted.\u003C\u002Fp\u003E","short":"\u003Cp\u003EToken used to obtain a renewed Access Token without forcing users to log in again.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["refresh token","refresh tokens"]},{"id":"refresh-token-rotation","title":"Refresh Token Rotation","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EStrategy of frequently replacing refresh tokens to minimize vulnerability. With refresh token rotation, every time your application exchanges a refresh token to get a new access token, Auth0 also returns a new refresh token.\u003C\u002Fp\u003E","short":"\u003Cp\u003EStrategy of frequently replacing refresh tokens to minimize vulnerability. With refresh token rotation, every time your application exchanges a refresh token to get a new access token, Auth0 also returns a new refresh token.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["refresh token rotation"]},{"id":"relying-party","title":"Relying Party","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EEntity (such as a service or application) that depends on a third-party identity provider to authenticate a user.\u003C\u002Fp\u003E","short":"\u003Cp\u003EEntity (such as a service or application) that depends on a third-party identity provider to authenticate a user.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["relying party","relying parties"]},{"id":"resource-owner","title":"Resource Owner","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EEntity (such as a user or application) capable of granting access to a protected resource.\u003C\u002Fp\u003E","short":"\u003Cp\u003EEntity (such as a user or application) capable of granting access to a protected resource.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["resource owner","resource owners"]},{"id":"resource-server","title":"Resource Server","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EServer hosting protected resources. Resource servers accept and respond to protected resource requests.\u003C\u002Fp\u003E","short":"\u003Cp\u003EServer hosting protected resources. Resource servers accept and respond to protected resource requests.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["resource server","resource servers"]},{"id":"role","title":"Role","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EAspect of a user’s identity assigned to the user to indicate the level of access they should have to the system. Roles are essentially collections of permissions.\u003C\u002Fp\u003E","short":"\u003Cp\u003EAspect of a user’s identity assigned to the user to give them a certain set of permissions.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["role","roles"]},{"id":"scope","title":"Scope","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EMechanism that defines the specific actions applications can be allowed to do or information that they can request on a user’s behalf. Often, applications will want to make use of the information that has already been created in an online resource. To do so, the application must ask for authorization to access this information on a user’s behalf. When an app requests permission to access a resource through an authorization server, it uses the Scope parameter to specify what access it needs, and the authorization server uses the Scope parameter to respond with the access that was actually granted.\u003C\u002Fp\u003E","short":"\u003Cp\u003EMechanism that determines actions applications can perform on a user's behalf with information previously created in an online resource.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["scope","scopes"]},{"id":"security-assertion-markup-language","title":"Security Assertion Markup Language (SAML)","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EXML-based standardized protocol by which two parties can exchange authentication information without the use of a password.\u003C\u002Fp\u003E","short":"\u003Cp\u003EStandardized protocol allowing two parties to exchange authentication information without a password.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["security assertion markup language (saml)","security assertion markup language","saml"]},{"id":"security-token","title":"Security Token","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EDigitally-signed artifact used to prove that the user was successfully authenticated.\u003C\u002Fp\u003E","short":"\u003Cp\u003EDigitally-signed artifact used to prove that the user was successfully authenticated.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["security token","security tokens"]},{"id":"session-cookie","title":"Session Cookie","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EEntity emitted by middleware after it establishes that the token it is receiving is signed, valid, and comes from a trusted source (the identity provider). This entity represents the fact that successful authentication occurred with the identity provider. This cookie prevents this process with tokens from needing to be continually repeated, by allowing the user to be considered authenticated as long as the cookie is present.\u003C\u002Fp\u003E","short":"\u003Cp\u003EEntity that, when present, allows the user to be considered authenticated.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["session cookie","session cookies"]},{"id":"shadow-account","title":"Shadow Account","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EDifficult-to-sustain practice of manually provisioning a user from a local directory separately in a remote directory (essentially creating a copy, or shadow, of the original account) when they need access to remote applications.\u003C\u002Fp\u003E","short":"\u003Cp\u003EDifficult-to-sustain practice of manually provisioning a user from a local directory separately in a remote directory.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["shadow account","shadow accounts"]},{"id":"signing-algorithm","title":"Signing Algorithm","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EHashing algorithm used to digitally sign tokens to ensure the token has not been tampered with by bad actors.\u003C\u002Fp\u003E","short":"\u003Cp\u003EAlgorithm used to digitally sign tokens to ensure the token has not been tampered with.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["signing algorithm","signing algorithms"]},{"id":"single-sign-on","title":"Single Sign-On (SSO)","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EService that, after a user logs into one application, automatically logs that user in to other applications, regardless of the platform, technology, or domain the user is using. The user signs in only one time (hence the name of the feature). Similarly, Single Logout (SLO) occurs when, after a user logs out from one application, they are logged out of each application or service where they were logged in. SSO and SLO are possible through the use of sessions.\u003C\u002Fp\u003E","short":"\u003Cp\u003EService that, after a user logs into one applicaton, automatically logs that user in to other applications.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["single sign-on (sso)","single sign-on","single sign on","sso","single signon"]},{"id":"subscription","title":"Subscription","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EAgreement that defines the features and quotas available for each of your tenants. Auth0 has multiple subscription levels to meet the needs of different developers and organizations.\u003C\u002Fp\u003E","short":"\u003Cp\u003EAgreement that defines the features and quotas available for each of your tenants. Auth0 has multiple subscription levels to meet the needs of different developers and organizations.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["subscription","subscriptions"]},{"id":"suspicious-ip-throttling","title":"Suspicious IP Throttling","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EForm of attack protection that protects your tenant against suspicious logins targeting too many accounts from a single IP address.\u003C\u002Fp\u003E","short":"\u003Cp\u003EForm of attack protection that protects your tenant against suspicious logins targeting too many accounts from a single IP address.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["suspicious ip throttling"]},{"id":"tenant","title":"Tenant","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EAt Auth0, a logically-isolated group of users who share common access with specific privileges to a single software instance. No tenant can access the data of another tenant, even though multiple tenants might be running on the same machine. Tenant, in general, is a term borrowed from software multitenant architecture.\u003C\u002Fp\u003E","short":"\u003Cp\u003EAt Auth0, a logically-isolated group of users who share common access with specific privileges to a single software instance. No tenant can access the data of another tenant, even though multiple tenants might be running on the same machine.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["tenant","tenants"]},{"id":"token-endpoint","title":"Token Endpoint","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EEndpoint on the Authorization Server that is used to programmatically request tokens.\u003C\u002Fp\u003E","short":"\u003Cp\u003EEndpoint on the Authorization Server that is used to programmatically request tokens.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["token endpoint","token endpoints"]},{"id":"tokenset","title":"Tokenset","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EFor each user's authorized connection, like Google or Microsoft, Token Vault creates a secure container called a tokenset. A tokenset contains the access and refresh tokens needed to call that external provider's APIs on the user's behalf. A tokenset securely stores access and refresh tokens on the Auth0 Authorization Server. \u003C\u002Fp\u003E","short":"\u003Cp\u003EContains the access and refresh tokens needed to call an external provider's APIs.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["tokenset","tokensets"]},{"id":"trigger","title":"Trigger","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EEvent that automatically invokes an Action when a specific operation, such as a user logging in, occurs at runtime. Some Triggers are executed synchronously, blocking the Flow in which they are involved, and some are executed asynchronously.\u003C\u002Fp\u003E","short":"\u003Cp\u003EEvent that automatically invokes an Action when a specific operation, such as a user logging in, occurs at runtime.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["trigger","triggers"]},{"id":"trust","title":"Trust","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EResource trusts an identity provider or authority when that resource is willing to believe what the authority says about its users.\u003C\u002Fp\u003E","short":"\u003Cp\u003EResource trusts an identity provider or authority when that resource is willing to believe what the authority says about its users.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["trust","trusts"]},{"id":"universal-login","title":"Universal Login","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EAuth0’s implementation of the authentication flow, which is the key feature of an Authorization Server. Each time a user needs to prove their identity, your \u003Ca\u003Eapplications\u003C\u002Fa\u003E redirect to Universal Login, and Auth0 will do what’s needed to guarantee the user’s identity.\u003C\u002Fp\u003E","short":"\u003Cp\u003EYour application redirects to Universal Login, hosted on Auth0's Authorization Server, to verify a user's identity.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["universal login"]},{"id":"ws-fed","title":"Web Service Federation (WS-Fed)","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EProtocol for managing user identities between systems, domains, and identity providers with established trust using WS-Trust. This protocol is mainly used for Microsoft products and defines policies on how to share federation metadata. \u003C\u002Fp\u003E","short":"\u003Cp\u003EProtocol for managing user identities across domains.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["web service federation (ws-fed)","web service federation","ws-fed"]}],"termsByLetter":{"A":[{"id":"access-token","title":"Access Token","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003ECredential that can be used by an application to access an API. It informs the API that the bearer of the token has been authorized to access the API and perform specific actions specified by the scope that has been granted. An Access Token can be in any format, but two popular options include opaque strings and JSON Web Tokens (JWT). They should be transmitted to the API as a Bearer credential in an HTTP Authorization header.\u003C\u002Fp\u003E","short":"\u003Cp\u003EAuthorization credential, in the form of an opaque string or JWT, used to access an API.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["access token","access tokens"]},{"id":"account linking","title":"Account Linking","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EConnecting user accounts across multiple platforms to allow users access to more than one resource or application by providing credentials one time.\u003C\u002Fp\u003E","short":"\u003Cp\u003EConnecting user accounts across multiple platforms.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["account linking"]},{"id":"actions","title":"Actions","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003ESecure, tenant-specific, versioned functions written in Node.js that execute at certain points during the Auth0 runtime. Actions are used to customize and extend Auth0's capabilities with custom logic.\u003C\u002Fp\u003E","short":"\u003Cp\u003ESecure, tenant-specific, versioned functions written in Node.js that execute at certain points during the Auth0 runtime.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["actions","action"]},{"id":"adaptive-multi-factor-authentication","title":"Adaptive Multi-factor Authentication","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EMulti-factor authentication (MFA) that is only triggered for users when an attempted login is determined to be a low confidence login. With Adaptive MFA, Auth0 triggers MFA only when needed to add friction for bad actors while keeping the login experience unchanged for good actors.\u003C\u002Fp\u003E","short":"\u003Cp\u003EMulti-factor authentication (MFA) that is only triggered for users when an attempted login is determined to be a low confidence login.   \u003C\u002Fp\u003E","automate":true,"automaticTerms":["adaptive multi-factor authentication","adaptive MFA","adaptive multifactor authentication"]},{"id":"application","title":"Application","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EYour software that relies on Auth0 for authentication and identity management. Auth0 supports single-page, regular web, native, and machine-to-machine applications.\u003C\u002Fp\u003E","short":"\u003Cp\u003EYour software that relies on Auth0 for authentication and identity management. Auth0 supports single-page, regular web, native, and machine-to-machine applications.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["application","applications"]},{"id":"attack-protection","title":"Attack Protection","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EFeatures that Auth0 provides to detect and mitigate attacks, including brute-force protection, suspicious IP throttling, breached password detection, bot detection, and adaptive multi-factor authentication.\u003C\u002Fp\u003E","short":"\u003Cp\u003EFeatures that Auth0 provides to detect and mitigate attacks, including brute-force protection, suspicious IP throttling, breached password detection, bot detection, and adaptive multi-factor authentication.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["attack protection"]},{"id":"audience","title":"Audience","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EUnique identifier of the audience for an issued token, identified within a JSON Web Token as the \u003Cb\u003Eaud\u003C\u002Fb\u003E claim. The audience value is either the application (\u003Ccode\u003EClient ID\u003C\u002Fcode\u003E) for an ID Token or the API that is being called (\u003Ccode\u003EAPI Identifier\u003C\u002Fcode\u003E) for an Access Token. At Auth0, the Audience value sent in a request for an Access Token dictates whether that token is returned in an opaque or JWT format.\u003C\u002Fp\u003E","short":"\u003Cp\u003EUnique identifier of the audience for an issued token. Named \u003Cb\u003Eaud\u003C\u002Fb\u003E in a token, its value contains the ID of either an application (\u003Ccode\u003EClient ID\u003C\u002Fcode\u003E) for an ID Token or an API (\u003Ccode\u003EAPI Identifier\u003C\u002Fcode\u003E) for an Access Token.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["audience"]},{"id":"auth0-dashboard","title":"Auth0 Dashboard","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EAuth0’s primary administrator interface in which you can register your application or API, connect to a user store or another identity provider, and configure your Auth0 services.\u003C\u002Fp\u003E","short":"\u003Cp\u003EAuth0's main product to configure your services.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["auth0 dashboard"]},{"id":"authentication-device","title":"Authentication Device","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EThe device on which the user will authenticate and grant consent in the Client-Initiated Backchannel Authentication Flow.\u003C\u002Fp\u003E","short":"\u003Cp\u003EThe device on which the user will authenticate and grant consent in the Client-Initiated Backchannel Authentication Flow.\u003C\u002Fp\u003E","automate":false},{"id":"authentication-server","title":"Authentication Server","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EServer that confirms or denies a user’s identity. An authentication server does not limit the actions or resources available to the user (although it can provide context for this purpose).\u003C\u002Fp\u003E","short":"\u003Cp\u003EServer that confirms or denies a user’s identity.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["authentication server","authentication servers"]},{"id":"authorization-code","title":"Authorization Code","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003ERandom string generated by the authorization server and returned to the application as part of the authorization response. The authorization code is relatively short-lived and is exchanged for an Access Token at the token endpoint when using the Authorization Code Flow (either with or without Proof Key for Code Exchange (PKCE)).\u003C\u002Fp\u003E","short":"\u003Cp\u003ERandom string generated by the authorization server and returned to the application as part of the authorization response when using the Authorization Code Flow (either with or without PKCE).\u003C\u002Fp\u003E","automate":false,"automaticTerms":["authorization code","auth code","authorization codes","auth codes"]},{"id":"authorization-flow","title":"Authorization Flow","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EAnother name for Authorization Grants outlined in OAuth 2.0. Authorization flows are the workflows a resource (an application or an AIP) uses to grant requestors access. Based on the type of technology (for example, if an application can store a Client Secret) and the type of requestor, resource owners can use Authorization Code Flow, Proof of Key Code Exchange (PKCE), Resource Owner Password Credential (ROPG), Implicit, or Client Credential.\u003C\u002Fp\u003E","short":"\u003Cp\u003EAuthorization grant (or workflow) specified in the OAuth 2.0 framework.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["authorization flow","authorization flows"]},{"id":"authorization-server","title":"Authorization Server","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003ECentralized server that contributes to defining the boundaries of a user’s access. For example, your authorization server can control the data, tasks, and features available to a user. An authorization server does not authenticate users. It’s the role of the authentication server to verify a user’s identity.\u003C\u002Fp\u003E","short":"\u003Cp\u003ECentralized server that contributes to defining the boundaries of a user’s access. For example, your authorization server can control the data, tasks, and features available to a user.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["authorization server","authorization servers"]}],"B":[{"id":"bad-actors","title":"Bad Actors","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EAlso known as threat actors. Entity (a person or group) that poses a threat to the business or environment with the intention to cause harm. Harm can constitute physical or cyber damages, from breaking into a data center to hacking into systems with stolen credentials.\u003C\u002Fp\u003E","short":"\u003Cp\u003EEntity (a person or group) that poses a threat to the business or environment with the intention to cause harm.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["bad actors","bad actor"]},{"id":"beta","title":"Beta","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EProduct release stage during which the referenced feature or behavior is provided to subscribers to give them time to explore and adopt new product capabilities while providing final feedback prior to a General Availability (GA) release. Functionality is code-complete, stable, useful in a variety of scenarios, and believed to meet or almost meet quality expectations for a GA release. Beta releases may be restricted to a select number of subscribers (private) or open to all subscribers (public).\u003C\u002Fp\u003E","short":"\u003Cp\u003EProduct release stage during which subscribers can explore and adopt new product capabilities while providing final feedback prior to a General Availability (GA) release. Beta releases may be public or private.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["beta","betas"]},{"id":"block-unblock","title":"Block\u002FUnblock Users","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003ERemoving or restoring a requestor's access to a resource. Refers to the features from Auth0's Attack Protection suite: Breached Password Detection, Brute-Force Protection, and Suspicious IP Throttling. Each service assesses login\u002Fsign-up trends and blocks IP addresses associated with suspicious activity.\u003C\u002Fp\u003E","short":"\u003Cp\u003ERemoving or restoring a requestor's access to a resource.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["block\u002Funblock users","block\u002Funblock user"]},{"id":"bot-detection","title":"Bot Detection","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EForm of attack protection in which Auth0 blocks suspected bot traffic by enabling a CAPTCHA during the login process.\u003C\u002Fp\u003E","short":"\u003Cp\u003EForm of attack protection in which Auth0 blocks suspected bot traffic by enabling a CAPTCHA during the login process.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["bot detection"]},{"id":"breached-password-detection","title":"Breached Password Detection","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EForm of attack protection in which Auth0 notifies your users if they use a username\u002Fpassword combination that has been compromised in a data leak on a third-party website or app.\u003C\u002Fp\u003E","short":"\u003Cp\u003EForm of attack protection in which Auth0 notifies your users if they use a username\u002Fpassword combination that has been compromised in a data leak on a third-party website or app.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["breached password detection"]},{"id":"breaking-change","title":"Breaking Change","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EChange to the Auth0 platform that, to Auth0's knowledge, will cause failures in the interoperation of the Auth0 platform and customer applications.\u003C\u002Fp\u003E","short":"\u003Cp\u003EChange to the Auth0 platform that, to Auth0's knowledge, will cause failures in the interoperation of the Auth0 platform and customer applications.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["breaking change","breaking changes"]},{"id":"brute-force-protection","title":"Brute-force Protection","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EForm of attack protection that safeguards against brute-force attacks that occur from a single IP address and target a single user account.\u003C\u002Fp\u003E","short":"\u003Cp\u003EForm of attack protection that safeguards against brute-force attacks that occur from a single IP address and target a single user account.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["brute-force protection","brute force protection"]}],"C":[{"id":"callback","title":"Callback","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EURL to which Auth0 sends its response after authentication. It is often the same URL to which a user is redirected after authentication.\u003C\u002Fp\u003E","short":"\u003Cp\u003EURL to which Auth0 sends its response after an API call and sometimes where a user is redirected after authentication.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["callback","callbacks"]},{"id":"claim","title":"Claim","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EAttribute packaged in a security token which represents a claim that the provider of the token is making about an entity.\u003C\u002Fp\u003E","short":"\u003Cp\u003EAttribute packaged in a security token which represents a claim that the provider of the token is making about an entity.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["claim","claims"]},{"id":"client-id","title":"Client ID","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EIdentification value assigned to your application after registration. This value is used in conjunction with other third-party services and can be found in \u003Cb\u003EAuth0 Dashboard\u003C\u002Fb\u003E &gt; \u003Cb\u003EApplication Settings\u003C\u002Fb\u003E.\u003C\u002Fp\u003E","short":"\u003Cp\u003EIdentification value given to your registered resource from Auth0.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["client id","client ids"]},{"id":"client-secret","title":"Client Secret","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003ESecret used by a client (application) to authenticate with the Authorization Server; it should be known to only the client and the Authorization Server and must be sufficiently random to not be guessable.\u003C\u002Fp\u003E","short":"\u003Cp\u003ESecret used by a client (application) to authenticate with the Authorization Server; it should be known to only the client and the Authorization Server and must be sufficiently random to not be guessable.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["client secret","client secrets"]},{"id":"confidential-client","title":"Confidential Client","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EAccording to the OAuth 2.0 protocol, clients (applications) can be classified as either confidential or public depending on whether or not they are able to hold credentials (such as a client ID and secret) securely. Confidential clients can hold credentials in a secure way without exposing them to unauthorized parties and require a trusted backend server to do so. They can use grant types that require them to authenticate by specifying their client ID and secret when calling the token endpoint and can have tokens issued to them that have been signed either symmetrically or asymmetrically.\u003C\u002Fp\u003E","short":"\u003Cp\u003EA client (application) that can hold credentials securely by using a trusted backend server. Examples include a web application with a secure backend and a machine-to-machine (M2M) application.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["confidential client","confidential clients"]},{"id":"confused-deputy","title":"Confused Deputy","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003ESituation in which an attacker tricks a client or service into performing an action on their behalf.\u003C\u002Fp\u003E","short":"\u003Cp\u003ESituation in which an attacker tricks a client or service into performing an action on their behalf.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["confused deputy","confused deputies"]},{"id":"connection","title":"Connection","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003ERelationship between Auth0 and the sources of users for your applications. Examples include identity providers (such as Google or Active Directory), passwordless authentication methods, or user databases.\u003C\u002Fp\u003E","short":"\u003Cp\u003ERelationship between Auth0 and the sources of users for your applications.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["connection","connections"]},{"id":"consumption-device","title":"Consumption Device","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EThe device that helps the user consume a service in the Client-Initiated Backchannel Authentication Flow. \u003C\u002Fp\u003E","short":"\u003Cp\u003EThe device that helps the user consume a service in the Client-Initiated Backchannel Authentication Flow. \u003C\u002Fp\u003E","automate":false},{"id":"custom-domain","title":"Custom Domain","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EThird-party domain with a specialized, or vanity, name. Also known as a CNAME.\u003C\u002Fp\u003E","short":"\u003Cp\u003EThird-party domain with a specialized, or vanity, name.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["custom domain","custom domains"]}],"D":[{"id":"deprecation","title":"Deprecation","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EProduct release stage indicating that the referenced feature or behavior is not supported for use by new subscribers, is not actively being enhanced, and is being only minimally maintained. Tenants using the feature or behavior at the time of deprecation will continue to have access.\u003C\u002Fp\u003E","short":"\u003Cp\u003EProduct release stage indicating that the referenced feature or behavior is not supported for use by new subscribers, is not actively being enhanced, and is being only minimally maintained.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["deprecation","deprecations"]},{"id":"digital-identity","title":"Digital Identity","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003ESet of attributes that define a particular user in the context of a function which is delivered by a particular application.\u003C\u002Fp\u003E","short":"\u003Cp\u003ESet of attributes that define a particular user in the context of a function which is delivered by a particular application.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["digital identity","digital identities"]},{"id":"digital-signature","title":"Digital Signature","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EEncrypted string that protects bits in a token from tampering. If the bits are changed or tampered with, the signature will no longer be able to be verified and it will be rejected.\u003C\u002Fp\u003E","short":"\u003Cp\u003EEncrypted string that protects bits in a token from tampering.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["digital signature","digital signatures"]},{"id":"directory","title":"Directory","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003ECentralized repository of users (the most well-known of which is Active Directory) which centralizes credentials and attributes and makes it unnecessary for each application to have their own local identity setup and pool of users. Allows single sign on to all applications that use the same directory of users.\u003C\u002Fp\u003E","short":"\u003Cp\u003ECentralized repository of users that allows single sign on to all applications that use the same directory.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["directory","directories"]}],"E":[{"id":"early-access","title":"Early Access","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EProduct release stage during which the referenced feature or behavior is provided to a limited number of subscribers or customer development partners (CDPs) to give them the opportunity to test and provide feedback on future functionality. At this stage, functionality may not be complete, but is ready for validation.\u003C\u002Fp\u003E","short":"\u003Cp\u003EProduct release stage during which the referenced feature or behavior is provided to a limited number of subscribers or customer development partners (CDPs) to give them the opportunity to test and provide feedback on future functionality.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["early access","ea"]},{"id":"end-of-life","title":"End of Life","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EProduct release stage indicating that the referenced feature or behavior is removed from the platform. Continued use of the feature or behavior will likely result in errors. The new behavior will automatically be enabled for Tenants that did not opt in during the migration window.\u003C\u002Fp\u003E","short":"\u003Cp\u003EProduct release stage indicating that the referenced feature or behavior is removed from the platform. Continued use of the feature or behavior will likely result in errors.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["end of life","eol"]},{"id":"end-of-life-date","title":"End of Life Date","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EDate when access to a feature or behavior is removed from the platform. End Of Life Dates can vary between different plan types.\u003C\u002Fp\u003E","short":"\u003Cp\u003EDate when access to a feature or behavior is removed from the platform. End Of Life Dates can vary between different plan types.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["end of life date","end of life dates","eol date"]}],"F":[{"id":"fine-grained-auth","title":"Fine-grained Authorization (FGA)","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EAuth0’s SaaS product that gives individual users access to specific objects or resources within your application.\u003C\u002Fp\u003E","short":"\u003Cp\u003EAuth0 product allowing individual users access to specific objects or resources.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["fine-grained authorization (fga)","fine-grained authorization","FGA"]},{"id":"flow","title":"Flow","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EProcesses that can be extended using Actions. Each Flow is made up of one or more Triggers and represents the logical pipeline through which information moves during a single point in the Auth0 journey.\u003C\u002Fp\u003E","short":"\u003Cp\u003EProcesses that can be extended using Actions. Each Flow is made up of one or more Triggers and represents the logical pipeline through which information moves during a single point in the Auth0 journey.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["flow","flows"]}],"G":[{"id":"general-availability","title":"General Availability","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EProduct release stage during which the referenced feature or behavior is fully functional and available to all subscribers (limited by pricing tier) for production use. If a new release replaces an existing feature, Auth0 provides a period of backward compatibility in accordance with our deprecation policy and informs customers so they have time to adopt the new release.\u003C\u002Fp\u003E","short":"\u003Cp\u003EProduct release stage during which the referenced feature or behavior is fully functional and available to all subscribers (limited by pricing tier) for production use.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["general availability","GA"]},{"id":"group","title":"Group","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003ESet of one or more users. In the Auth0 Authorization Extension, use groups to grant access to many users at a time.\u003C\u002Fp\u003E","short":"\u003Cp\u003ESet of one or more users. In the Auth0 Authorization Extension, use groups to grant access to many users at a time.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["group","groups"]}],"I":[{"id":"id-token","title":"ID Token","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003ECredential meant for the client itself, rather than for accessing a resource. It has a fixed format that clients can parse and validate.\u003C\u002Fp\u003E","short":"\u003Cp\u003ECredential meant for the client itself, rather than for accessing a resource.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["id token","id tokens","identity token","identity tokens"]},{"id":"idp","title":"Identity Provider (IdP)","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EService that stores and manages digital identities. Auth0 supports trusted social, enterprise, and legal identity providers. Auth0 also can function as an identity provider for your applications.\u003C\u002Fp\u003E","short":"\u003Cp\u003EService that stores and manages digital identities.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["identity provider (idp)","identity providers","identity provider","idp","idps","identity providers (idps)"]}],"J":[{"id":"json-web-token","title":"JSON Web Token (JWT)","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EOpen, industry standard \u003Ca href=\"https:\u002F\u002Ftools.ietf.org\u002Fhtml\u002Frfc7519\" target=\"_blank\" rel=\"noreferrer noopener\"\u003ERFC 7519\u003C\u002Fa\u003E method for representing claims securely between two parties. At Auth0, ID Tokens are always returned in JWT format, and Access Tokens are often in JWT format. You may decode well-formed JWTs at \u003Ca href=\"https:\u002F\u002Fjwt.io\" target=\"_blank\" rel=\"noreferrer noopener\"\u003EJWT.io\u003C\u002Fa\u003E to view their claims.\u003C\u002Fp\u003E","short":"\u003Cp\u003EStandard ID Token format (and often Access Token format) used to represent claims securely between two parties.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["json web token (jwt)","json web token","json web tokens","jwt","jwts","json web tokens (jwts)"]}],"L":[{"id":"localization","title":"Localization","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EAbility to render the New Universal Login experience into a supported language.\u003C\u002Fp\u003E","short":"\u003Cp\u003EAbility to render the New Universal Login experience into a supported language.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["localization"]},{"id":"lock","title":"Lock","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EAuth0's UI widget for authenticating users. It is ready to go as-is and is the default face of the Classic Universal Login experience. Lock allows you to customize minor behavioral and appearance options, but its primary goal is ease of use.\u003C\u002Fp\u003E","short":"\u003Cp\u003EAuth0's UI widget for authenticating users.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["lock"]}],"M":[{"id":"management-api","title":"Management API","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EAuth0's API to manage Auth0 services and perform administrative tasks programatically.\u003C\u002Fp\u003E","short":"\u003Cp\u003EA product to allow customers to perform administrative tasks. \u003C\u002Fp\u003E","automate":true,"automaticTerms":["management api"]},{"id":"metadata","title":"Metadata","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EInformation users can update, such as preferences or profile settings. Metadata is added to ID tokens and can be stored in user profiles.\u003C\u002Fp\u003E","short":"\u003Cp\u003EUser information stored in user profiles.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["metadata"]},{"id":"migration","title":"Migration","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EProcess by which a customer moves away from a particular feature or behavior. Migrations should occur during the Deprecation product release stage.\u003C\u002Fp\u003E","short":"\u003Cp\u003EProcess by which a customer moves away from a particular feature or behavior. Migrations should occur during the Deprecation product release stage.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["migration","migrations"]},{"id":"multifactor-authentication","title":"Multi-factor authentication (MFA)","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EAuthentication process that considers multiple factors. Typically at Auth0, the first factor is the standard username\u002Fpassword exchange, and the second is a code or link via email or SMS, a one-time-password via an app such as Authy or Google Authenticator, or a push notification via a phone app such as Guardian or Duo. Using multiple factors allows your account to remain secure if someone captures one or the other factor--acquires your password or steals your phone, for example.\u003C\u002Fp\u003E","short":"\u003Cp\u003EUser authentication process that uses a factor in addition to username and password such as a code via SMS.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["multi-factor authentication (mfa)","multi-factor authentication","multifactor authentication","mfa"]}],"N":[{"id":"nonce","title":"Nonce","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EArbitrary (often random or pseudo-random) number issued in an authentication protocol that can be used to help detect and mitigate replay attacks using old communications. In other words, the nonce is only issued once, so if an attacker attempts to replay a transaction with a different nonce, its false transaction can be detected more easily.\u003C\u002Fp\u003E","short":"\u003Cp\u003EArbitrary number issued once in an authentication protocol to detect and prevent replay attacks.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["nonce","nonces"]}],"O":[{"id":"oath2","title":"OAuth 2.0","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EAuthorization framework that defines authorization protocols and workflows. OAuth 2.0 defines roles, authorization grants (or workflows), authorization requests and responses, and token handling. OpenID Connect (OIDC) protocols to verify user identity extends OAuth 2.0.\u003C\u002Fp\u003E","short":"\u003Cp\u003EAuthorization framework that defines authorization protocols and workflows.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["oauth 2.0","oauth"]},{"id":"openid","title":"OpenID","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EOpen standard for authentication that allows applications to verify users are who they say they are without needing to collect, store, and therefore become liable for a user’s login information.\u003C\u002Fp\u003E","short":"\u003Cp\u003EOpen standard for authentication that allows applications to verify users' identities without collecting and storing login information.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["openid"]},{"id":"organizations","title":"Organizations","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EAuth0 product that allows B2B customers to categorize end-users and define specific roles, login experience, and access to resources.\u003C\u002Fp\u003E","short":"\u003Cp\u003EAuth0 product that allows B2B customers to categorize end-users and define specific roles.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["organizations","organization"]}],"P":[{"id":"passwordless","title":"Passwordless","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EForm of authentication where the first factor is not a password. Instead, it could be a one-time password received by email or SMS, a push notification, or a biometric sensor. Passwordless uses one-time passwords, so users are less susceptible to the typical password-based attacks (e.g., dictionary or credential stuffing) than with traditional username\u002Fpassword logins.\u003C\u002Fp\u003E","short":"\u003Cp\u003EForm of authentication that does not rely on a password as the first factor.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["passwordless"]},{"id":"perimeter","title":"Perimeter","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003ESet of boundaries that encompass a directory, all of its users, and all of the applications which use the directory. In some implementations, this perimeter is a physical location; in others, it is a set of networks or devices connected via VPN.\u003C\u002Fp\u003E","short":"\u003Cp\u003ESet of boundaries that encompass a directory, all of its users, and all of the applications which use the directory.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["perimeter","perimeters"]},{"id":"product-release-stages","title":"Product Release Stages","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EPhases that describe how Auth0 stages, releases, and retires product functionality. Product features may not progress through all release stages, and the time in each stage will vary depending on the scope and impact of the feature.\u003C\u002Fp\u003E","short":"\u003Cp\u003EPhases that describe how Auth0 stages, releases, and retires product functionality.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["product release stages","product release stage"]},{"id":"public-client","title":"Public Client","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EAccording to the OAuth 2.0 protocol, clients (applications) can be classified as either confidential or public depending on whether or not they are able to hold credentials (such as a client ID and secret) securely. Public clients&nbsp;cannot&nbsp;hold credentials securely, so should only use grant types that do not require the use of their client secret. ID Tokens issued to them must be signed asymmetrically using a private key (RS256) and verified using the public key corresponding to the private key used to sign the token.\u003C\u002Fp\u003E","short":"\u003Cp\u003EClient (application) that cannot hold credentials securely. Examples include a native desktop or mobile application and a JavaScript-based client-side web application (such as a single-page app (SPA)).\u003C\u002Fp\u003E","automate":true,"automaticTerms":["public client","public clients"]}],"R":[{"id":"raw-credential","title":"Raw Credential","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EShared secret or set of information that is agreed upon between the user and the resource that allow the resource to verify the identity of a user.\u003C\u002Fp\u003E","short":"\u003Cp\u003EShared secret or set of information that is agreed upon between the user and the resource that allow the resource to verify the identity of a user.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["raw credential","raw credentials"]},{"id":"refresh-token","title":"Refresh Token","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003ESpecial kind of token that can be used to obtain a renewed Access Token. It is useful for renewing expiring Access Tokens without forcing the user to log in again. Using the Refresh Token, you can request a new Access Token at any time until the Refresh Token is blocklisted.\u003C\u002Fp\u003E","short":"\u003Cp\u003EToken used to obtain a renewed Access Token without forcing users to log in again.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["refresh token","refresh tokens"]},{"id":"refresh-token-rotation","title":"Refresh Token Rotation","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EStrategy of frequently replacing refresh tokens to minimize vulnerability. With refresh token rotation, every time your application exchanges a refresh token to get a new access token, Auth0 also returns a new refresh token.\u003C\u002Fp\u003E","short":"\u003Cp\u003EStrategy of frequently replacing refresh tokens to minimize vulnerability. With refresh token rotation, every time your application exchanges a refresh token to get a new access token, Auth0 also returns a new refresh token.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["refresh token rotation"]},{"id":"relying-party","title":"Relying Party","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EEntity (such as a service or application) that depends on a third-party identity provider to authenticate a user.\u003C\u002Fp\u003E","short":"\u003Cp\u003EEntity (such as a service or application) that depends on a third-party identity provider to authenticate a user.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["relying party","relying parties"]},{"id":"resource-owner","title":"Resource Owner","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EEntity (such as a user or application) capable of granting access to a protected resource.\u003C\u002Fp\u003E","short":"\u003Cp\u003EEntity (such as a user or application) capable of granting access to a protected resource.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["resource owner","resource owners"]},{"id":"resource-server","title":"Resource Server","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EServer hosting protected resources. Resource servers accept and respond to protected resource requests.\u003C\u002Fp\u003E","short":"\u003Cp\u003EServer hosting protected resources. Resource servers accept and respond to protected resource requests.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["resource server","resource servers"]},{"id":"role","title":"Role","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EAspect of a user’s identity assigned to the user to indicate the level of access they should have to the system. Roles are essentially collections of permissions.\u003C\u002Fp\u003E","short":"\u003Cp\u003EAspect of a user’s identity assigned to the user to give them a certain set of permissions.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["role","roles"]}],"S":[{"id":"scope","title":"Scope","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EMechanism that defines the specific actions applications can be allowed to do or information that they can request on a user’s behalf. Often, applications will want to make use of the information that has already been created in an online resource. To do so, the application must ask for authorization to access this information on a user’s behalf. When an app requests permission to access a resource through an authorization server, it uses the Scope parameter to specify what access it needs, and the authorization server uses the Scope parameter to respond with the access that was actually granted.\u003C\u002Fp\u003E","short":"\u003Cp\u003EMechanism that determines actions applications can perform on a user's behalf with information previously created in an online resource.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["scope","scopes"]},{"id":"security-assertion-markup-language","title":"Security Assertion Markup Language (SAML)","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EXML-based standardized protocol by which two parties can exchange authentication information without the use of a password.\u003C\u002Fp\u003E","short":"\u003Cp\u003EStandardized protocol allowing two parties to exchange authentication information without a password.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["security assertion markup language (saml)","security assertion markup language","saml"]},{"id":"security-token","title":"Security Token","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EDigitally-signed artifact used to prove that the user was successfully authenticated.\u003C\u002Fp\u003E","short":"\u003Cp\u003EDigitally-signed artifact used to prove that the user was successfully authenticated.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["security token","security tokens"]},{"id":"session-cookie","title":"Session Cookie","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EEntity emitted by middleware after it establishes that the token it is receiving is signed, valid, and comes from a trusted source (the identity provider). This entity represents the fact that successful authentication occurred with the identity provider. This cookie prevents this process with tokens from needing to be continually repeated, by allowing the user to be considered authenticated as long as the cookie is present.\u003C\u002Fp\u003E","short":"\u003Cp\u003EEntity that, when present, allows the user to be considered authenticated.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["session cookie","session cookies"]},{"id":"shadow-account","title":"Shadow Account","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EDifficult-to-sustain practice of manually provisioning a user from a local directory separately in a remote directory (essentially creating a copy, or shadow, of the original account) when they need access to remote applications.\u003C\u002Fp\u003E","short":"\u003Cp\u003EDifficult-to-sustain practice of manually provisioning a user from a local directory separately in a remote directory.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["shadow account","shadow accounts"]},{"id":"signing-algorithm","title":"Signing Algorithm","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EHashing algorithm used to digitally sign tokens to ensure the token has not been tampered with by bad actors.\u003C\u002Fp\u003E","short":"\u003Cp\u003EAlgorithm used to digitally sign tokens to ensure the token has not been tampered with.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["signing algorithm","signing algorithms"]},{"id":"single-sign-on","title":"Single Sign-On (SSO)","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EService that, after a user logs into one application, automatically logs that user in to other applications, regardless of the platform, technology, or domain the user is using. The user signs in only one time (hence the name of the feature). Similarly, Single Logout (SLO) occurs when, after a user logs out from one application, they are logged out of each application or service where they were logged in. SSO and SLO are possible through the use of sessions.\u003C\u002Fp\u003E","short":"\u003Cp\u003EService that, after a user logs into one applicaton, automatically logs that user in to other applications.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["single sign-on (sso)","single sign-on","single sign on","sso","single signon"]},{"id":"subscription","title":"Subscription","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EAgreement that defines the features and quotas available for each of your tenants. Auth0 has multiple subscription levels to meet the needs of different developers and organizations.\u003C\u002Fp\u003E","short":"\u003Cp\u003EAgreement that defines the features and quotas available for each of your tenants. Auth0 has multiple subscription levels to meet the needs of different developers and organizations.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["subscription","subscriptions"]},{"id":"suspicious-ip-throttling","title":"Suspicious IP Throttling","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EForm of attack protection that protects your tenant against suspicious logins targeting too many accounts from a single IP address.\u003C\u002Fp\u003E","short":"\u003Cp\u003EForm of attack protection that protects your tenant against suspicious logins targeting too many accounts from a single IP address.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["suspicious ip throttling"]}],"T":[{"id":"tenant","title":"Tenant","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EAt Auth0, a logically-isolated group of users who share common access with specific privileges to a single software instance. No tenant can access the data of another tenant, even though multiple tenants might be running on the same machine. Tenant, in general, is a term borrowed from software multitenant architecture.\u003C\u002Fp\u003E","short":"\u003Cp\u003EAt Auth0, a logically-isolated group of users who share common access with specific privileges to a single software instance. No tenant can access the data of another tenant, even though multiple tenants might be running on the same machine.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["tenant","tenants"]},{"id":"token-endpoint","title":"Token Endpoint","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EEndpoint on the Authorization Server that is used to programmatically request tokens.\u003C\u002Fp\u003E","short":"\u003Cp\u003EEndpoint on the Authorization Server that is used to programmatically request tokens.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["token endpoint","token endpoints"]},{"id":"tokenset","title":"Tokenset","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EFor each user's authorized connection, like Google or Microsoft, Token Vault creates a secure container called a tokenset. A tokenset contains the access and refresh tokens needed to call that external provider's APIs on the user's behalf. A tokenset securely stores access and refresh tokens on the Auth0 Authorization Server. \u003C\u002Fp\u003E","short":"\u003Cp\u003EContains the access and refresh tokens needed to call an external provider's APIs.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["tokenset","tokensets"]},{"id":"trigger","title":"Trigger","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EEvent that automatically invokes an Action when a specific operation, such as a user logging in, occurs at runtime. Some Triggers are executed synchronously, blocking the Flow in which they are involved, and some are executed asynchronously.\u003C\u002Fp\u003E","short":"\u003Cp\u003EEvent that automatically invokes an Action when a specific operation, such as a user logging in, occurs at runtime.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["trigger","triggers"]},{"id":"trust","title":"Trust","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EResource trusts an identity provider or authority when that resource is willing to believe what the authority says about its users.\u003C\u002Fp\u003E","short":"\u003Cp\u003EResource trusts an identity provider or authority when that resource is willing to believe what the authority says about its users.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["trust","trusts"]}],"U":[{"id":"universal-login","title":"Universal Login","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EAuth0’s implementation of the authentication flow, which is the key feature of an Authorization Server. Each time a user needs to prove their identity, your \u003Ca\u003Eapplications\u003C\u002Fa\u003E redirect to Universal Login, and Auth0 will do what’s needed to guarantee the user’s identity.\u003C\u002Fp\u003E","short":"\u003Cp\u003EYour application redirects to Universal Login, hosted on Auth0's Authorization Server, to verify a user's identity.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["universal login"]}],"W":[{"id":"ws-fed","title":"Web Service Federation (WS-Fed)","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EProtocol for managing user identities between systems, domains, and identity providers with established trust using WS-Trust. This protocol is mainly used for Microsoft products and defines policies on how to share federation metadata. \u003C\u002Fp\u003E","short":"\u003Cp\u003EProtocol for managing user identities across domains.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["web service federation (ws-fed)","web service federation","ws-fed"]}]},"termsById":{"access-token":{"title":"Access Token","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003ECredential that can be used by an application to access an API. It informs the API that the bearer of the token has been authorized to access the API and perform specific actions specified by the scope that has been granted. An Access Token can be in any format, but two popular options include opaque strings and JSON Web Tokens (JWT). They should be transmitted to the API as a Bearer credential in an HTTP Authorization header.\u003C\u002Fp\u003E","short":"\u003Cp\u003EAuthorization credential, in the form of an opaque string or JWT, used to access an API.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["access token","access tokens"]},"account linking":{"title":"Account Linking","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EConnecting user accounts across multiple platforms to allow users access to more than one resource or application by providing credentials one time.\u003C\u002Fp\u003E","short":"\u003Cp\u003EConnecting user accounts across multiple platforms.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["account linking"]},"actions":{"title":"Actions","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003ESecure, tenant-specific, versioned functions written in Node.js that execute at certain points during the Auth0 runtime. Actions are used to customize and extend Auth0's capabilities with custom logic.\u003C\u002Fp\u003E","short":"\u003Cp\u003ESecure, tenant-specific, versioned functions written in Node.js that execute at certain points during the Auth0 runtime.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["actions","action"]},"adaptive-multi-factor-authentication":{"title":"Adaptive Multi-factor Authentication","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EMulti-factor authentication (MFA) that is only triggered for users when an attempted login is determined to be a low confidence login. With Adaptive MFA, Auth0 triggers MFA only when needed to add friction for bad actors while keeping the login experience unchanged for good actors.\u003C\u002Fp\u003E","short":"\u003Cp\u003EMulti-factor authentication (MFA) that is only triggered for users when an attempted login is determined to be a low confidence login.   \u003C\u002Fp\u003E","automate":true,"automaticTerms":["adaptive multi-factor authentication","adaptive MFA","adaptive multifactor authentication"]},"application":{"title":"Application","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EYour software that relies on Auth0 for authentication and identity management. Auth0 supports single-page, regular web, native, and machine-to-machine applications.\u003C\u002Fp\u003E","short":"\u003Cp\u003EYour software that relies on Auth0 for authentication and identity management. Auth0 supports single-page, regular web, native, and machine-to-machine applications.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["application","applications"]},"attack-protection":{"title":"Attack Protection","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EFeatures that Auth0 provides to detect and mitigate attacks, including brute-force protection, suspicious IP throttling, breached password detection, bot detection, and adaptive multi-factor authentication.\u003C\u002Fp\u003E","short":"\u003Cp\u003EFeatures that Auth0 provides to detect and mitigate attacks, including brute-force protection, suspicious IP throttling, breached password detection, bot detection, and adaptive multi-factor authentication.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["attack protection"]},"audience":{"title":"Audience","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EUnique identifier of the audience for an issued token, identified within a JSON Web Token as the \u003Cb\u003Eaud\u003C\u002Fb\u003E claim. The audience value is either the application (\u003Ccode\u003EClient ID\u003C\u002Fcode\u003E) for an ID Token or the API that is being called (\u003Ccode\u003EAPI Identifier\u003C\u002Fcode\u003E) for an Access Token. At Auth0, the Audience value sent in a request for an Access Token dictates whether that token is returned in an opaque or JWT format.\u003C\u002Fp\u003E","short":"\u003Cp\u003EUnique identifier of the audience for an issued token. Named \u003Cb\u003Eaud\u003C\u002Fb\u003E in a token, its value contains the ID of either an application (\u003Ccode\u003EClient ID\u003C\u002Fcode\u003E) for an ID Token or an API (\u003Ccode\u003EAPI Identifier\u003C\u002Fcode\u003E) for an Access Token.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["audience"]},"auth0-dashboard":{"title":"Auth0 Dashboard","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EAuth0’s primary administrator interface in which you can register your application or API, connect to a user store or another identity provider, and configure your Auth0 services.\u003C\u002Fp\u003E","short":"\u003Cp\u003EAuth0's main product to configure your services.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["auth0 dashboard"]},"authentication-device":{"title":"Authentication Device","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EThe device on which the user will authenticate and grant consent in the Client-Initiated Backchannel Authentication Flow.\u003C\u002Fp\u003E","short":"\u003Cp\u003EThe device on which the user will authenticate and grant consent in the Client-Initiated Backchannel Authentication Flow.\u003C\u002Fp\u003E","automate":false},"authentication-server":{"title":"Authentication Server","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EServer that confirms or denies a user’s identity. An authentication server does not limit the actions or resources available to the user (although it can provide context for this purpose).\u003C\u002Fp\u003E","short":"\u003Cp\u003EServer that confirms or denies a user’s identity.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["authentication server","authentication servers"]},"authorization-code":{"title":"Authorization Code","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003ERandom string generated by the authorization server and returned to the application as part of the authorization response. The authorization code is relatively short-lived and is exchanged for an Access Token at the token endpoint when using the Authorization Code Flow (either with or without Proof Key for Code Exchange (PKCE)).\u003C\u002Fp\u003E","short":"\u003Cp\u003ERandom string generated by the authorization server and returned to the application as part of the authorization response when using the Authorization Code Flow (either with or without PKCE).\u003C\u002Fp\u003E","automate":false,"automaticTerms":["authorization code","auth code","authorization codes","auth codes"]},"authorization-flow":{"title":"Authorization Flow","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EAnother name for Authorization Grants outlined in OAuth 2.0. Authorization flows are the workflows a resource (an application or an AIP) uses to grant requestors access. Based on the type of technology (for example, if an application can store a Client Secret) and the type of requestor, resource owners can use Authorization Code Flow, Proof of Key Code Exchange (PKCE), Resource Owner Password Credential (ROPG), Implicit, or Client Credential.\u003C\u002Fp\u003E","short":"\u003Cp\u003EAuthorization grant (or workflow) specified in the OAuth 2.0 framework.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["authorization flow","authorization flows"]},"authorization-server":{"title":"Authorization Server","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003ECentralized server that contributes to defining the boundaries of a user’s access. For example, your authorization server can control the data, tasks, and features available to a user. An authorization server does not authenticate users. It’s the role of the authentication server to verify a user’s identity.\u003C\u002Fp\u003E","short":"\u003Cp\u003ECentralized server that contributes to defining the boundaries of a user’s access. For example, your authorization server can control the data, tasks, and features available to a user.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["authorization server","authorization servers"]},"bad-actors":{"title":"Bad Actors","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EAlso known as threat actors. Entity (a person or group) that poses a threat to the business or environment with the intention to cause harm. Harm can constitute physical or cyber damages, from breaking into a data center to hacking into systems with stolen credentials.\u003C\u002Fp\u003E","short":"\u003Cp\u003EEntity (a person or group) that poses a threat to the business or environment with the intention to cause harm.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["bad actors","bad actor"]},"beta":{"title":"Beta","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EProduct release stage during which the referenced feature or behavior is provided to subscribers to give them time to explore and adopt new product capabilities while providing final feedback prior to a General Availability (GA) release. Functionality is code-complete, stable, useful in a variety of scenarios, and believed to meet or almost meet quality expectations for a GA release. Beta releases may be restricted to a select number of subscribers (private) or open to all subscribers (public).\u003C\u002Fp\u003E","short":"\u003Cp\u003EProduct release stage during which subscribers can explore and adopt new product capabilities while providing final feedback prior to a General Availability (GA) release. Beta releases may be public or private.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["beta","betas"]},"block-unblock":{"title":"Block\u002FUnblock Users","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003ERemoving or restoring a requestor's access to a resource. Refers to the features from Auth0's Attack Protection suite: Breached Password Detection, Brute-Force Protection, and Suspicious IP Throttling. Each service assesses login\u002Fsign-up trends and blocks IP addresses associated with suspicious activity.\u003C\u002Fp\u003E","short":"\u003Cp\u003ERemoving or restoring a requestor's access to a resource.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["block\u002Funblock users","block\u002Funblock user"]},"bot-detection":{"title":"Bot Detection","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EForm of attack protection in which Auth0 blocks suspected bot traffic by enabling a CAPTCHA during the login process.\u003C\u002Fp\u003E","short":"\u003Cp\u003EForm of attack protection in which Auth0 blocks suspected bot traffic by enabling a CAPTCHA during the login process.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["bot detection"]},"breached-password-detection":{"title":"Breached Password Detection","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EForm of attack protection in which Auth0 notifies your users if they use a username\u002Fpassword combination that has been compromised in a data leak on a third-party website or app.\u003C\u002Fp\u003E","short":"\u003Cp\u003EForm of attack protection in which Auth0 notifies your users if they use a username\u002Fpassword combination that has been compromised in a data leak on a third-party website or app.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["breached password detection"]},"breaking-change":{"title":"Breaking Change","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EChange to the Auth0 platform that, to Auth0's knowledge, will cause failures in the interoperation of the Auth0 platform and customer applications.\u003C\u002Fp\u003E","short":"\u003Cp\u003EChange to the Auth0 platform that, to Auth0's knowledge, will cause failures in the interoperation of the Auth0 platform and customer applications.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["breaking change","breaking changes"]},"brute-force-protection":{"title":"Brute-force Protection","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EForm of attack protection that safeguards against brute-force attacks that occur from a single IP address and target a single user account.\u003C\u002Fp\u003E","short":"\u003Cp\u003EForm of attack protection that safeguards against brute-force attacks that occur from a single IP address and target a single user account.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["brute-force protection","brute force protection"]},"callback":{"title":"Callback","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EURL to which Auth0 sends its response after authentication. It is often the same URL to which a user is redirected after authentication.\u003C\u002Fp\u003E","short":"\u003Cp\u003EURL to which Auth0 sends its response after an API call and sometimes where a user is redirected after authentication.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["callback","callbacks"]},"claim":{"title":"Claim","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EAttribute packaged in a security token which represents a claim that the provider of the token is making about an entity.\u003C\u002Fp\u003E","short":"\u003Cp\u003EAttribute packaged in a security token which represents a claim that the provider of the token is making about an entity.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["claim","claims"]},"client-id":{"title":"Client ID","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EIdentification value assigned to your application after registration. This value is used in conjunction with other third-party services and can be found in \u003Cb\u003EAuth0 Dashboard\u003C\u002Fb\u003E &gt; \u003Cb\u003EApplication Settings\u003C\u002Fb\u003E.\u003C\u002Fp\u003E","short":"\u003Cp\u003EIdentification value given to your registered resource from Auth0.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["client id","client ids"]},"client-secret":{"title":"Client Secret","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003ESecret used by a client (application) to authenticate with the Authorization Server; it should be known to only the client and the Authorization Server and must be sufficiently random to not be guessable.\u003C\u002Fp\u003E","short":"\u003Cp\u003ESecret used by a client (application) to authenticate with the Authorization Server; it should be known to only the client and the Authorization Server and must be sufficiently random to not be guessable.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["client secret","client secrets"]},"confidential-client":{"title":"Confidential Client","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EAccording to the OAuth 2.0 protocol, clients (applications) can be classified as either confidential or public depending on whether or not they are able to hold credentials (such as a client ID and secret) securely. Confidential clients can hold credentials in a secure way without exposing them to unauthorized parties and require a trusted backend server to do so. They can use grant types that require them to authenticate by specifying their client ID and secret when calling the token endpoint and can have tokens issued to them that have been signed either symmetrically or asymmetrically.\u003C\u002Fp\u003E","short":"\u003Cp\u003EA client (application) that can hold credentials securely by using a trusted backend server. Examples include a web application with a secure backend and a machine-to-machine (M2M) application.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["confidential client","confidential clients"]},"confused-deputy":{"title":"Confused Deputy","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003ESituation in which an attacker tricks a client or service into performing an action on their behalf.\u003C\u002Fp\u003E","short":"\u003Cp\u003ESituation in which an attacker tricks a client or service into performing an action on their behalf.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["confused deputy","confused deputies"]},"connection":{"title":"Connection","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003ERelationship between Auth0 and the sources of users for your applications. Examples include identity providers (such as Google or Active Directory), passwordless authentication methods, or user databases.\u003C\u002Fp\u003E","short":"\u003Cp\u003ERelationship between Auth0 and the sources of users for your applications.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["connection","connections"]},"consumption-device":{"title":"Consumption Device","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EThe device that helps the user consume a service in the Client-Initiated Backchannel Authentication Flow. \u003C\u002Fp\u003E","short":"\u003Cp\u003EThe device that helps the user consume a service in the Client-Initiated Backchannel Authentication Flow. \u003C\u002Fp\u003E","automate":false},"custom-domain":{"title":"Custom Domain","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EThird-party domain with a specialized, or vanity, name. Also known as a CNAME.\u003C\u002Fp\u003E","short":"\u003Cp\u003EThird-party domain with a specialized, or vanity, name.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["custom domain","custom domains"]},"deprecation":{"title":"Deprecation","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EProduct release stage indicating that the referenced feature or behavior is not supported for use by new subscribers, is not actively being enhanced, and is being only minimally maintained. Tenants using the feature or behavior at the time of deprecation will continue to have access.\u003C\u002Fp\u003E","short":"\u003Cp\u003EProduct release stage indicating that the referenced feature or behavior is not supported for use by new subscribers, is not actively being enhanced, and is being only minimally maintained.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["deprecation","deprecations"]},"digital-identity":{"title":"Digital Identity","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003ESet of attributes that define a particular user in the context of a function which is delivered by a particular application.\u003C\u002Fp\u003E","short":"\u003Cp\u003ESet of attributes that define a particular user in the context of a function which is delivered by a particular application.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["digital identity","digital identities"]},"digital-signature":{"title":"Digital Signature","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EEncrypted string that protects bits in a token from tampering. If the bits are changed or tampered with, the signature will no longer be able to be verified and it will be rejected.\u003C\u002Fp\u003E","short":"\u003Cp\u003EEncrypted string that protects bits in a token from tampering.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["digital signature","digital signatures"]},"directory":{"title":"Directory","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003ECentralized repository of users (the most well-known of which is Active Directory) which centralizes credentials and attributes and makes it unnecessary for each application to have their own local identity setup and pool of users. Allows single sign on to all applications that use the same directory of users.\u003C\u002Fp\u003E","short":"\u003Cp\u003ECentralized repository of users that allows single sign on to all applications that use the same directory.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["directory","directories"]},"early-access":{"title":"Early Access","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EProduct release stage during which the referenced feature or behavior is provided to a limited number of subscribers or customer development partners (CDPs) to give them the opportunity to test and provide feedback on future functionality. At this stage, functionality may not be complete, but is ready for validation.\u003C\u002Fp\u003E","short":"\u003Cp\u003EProduct release stage during which the referenced feature or behavior is provided to a limited number of subscribers or customer development partners (CDPs) to give them the opportunity to test and provide feedback on future functionality.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["early access","ea"]},"end-of-life":{"title":"End of Life","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EProduct release stage indicating that the referenced feature or behavior is removed from the platform. Continued use of the feature or behavior will likely result in errors. The new behavior will automatically be enabled for Tenants that did not opt in during the migration window.\u003C\u002Fp\u003E","short":"\u003Cp\u003EProduct release stage indicating that the referenced feature or behavior is removed from the platform. Continued use of the feature or behavior will likely result in errors.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["end of life","eol"]},"end-of-life-date":{"title":"End of Life Date","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EDate when access to a feature or behavior is removed from the platform. End Of Life Dates can vary between different plan types.\u003C\u002Fp\u003E","short":"\u003Cp\u003EDate when access to a feature or behavior is removed from the platform. End Of Life Dates can vary between different plan types.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["end of life date","end of life dates","eol date"]},"fine-grained-auth":{"title":"Fine-grained Authorization (FGA)","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EAuth0’s SaaS product that gives individual users access to specific objects or resources within your application.\u003C\u002Fp\u003E","short":"\u003Cp\u003EAuth0 product allowing individual users access to specific objects or resources.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["fine-grained authorization (fga)","fine-grained authorization","FGA"]},"flow":{"title":"Flow","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EProcesses that can be extended using Actions. Each Flow is made up of one or more Triggers and represents the logical pipeline through which information moves during a single point in the Auth0 journey.\u003C\u002Fp\u003E","short":"\u003Cp\u003EProcesses that can be extended using Actions. Each Flow is made up of one or more Triggers and represents the logical pipeline through which information moves during a single point in the Auth0 journey.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["flow","flows"]},"general-availability":{"title":"General Availability","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EProduct release stage during which the referenced feature or behavior is fully functional and available to all subscribers (limited by pricing tier) for production use. If a new release replaces an existing feature, Auth0 provides a period of backward compatibility in accordance with our deprecation policy and informs customers so they have time to adopt the new release.\u003C\u002Fp\u003E","short":"\u003Cp\u003EProduct release stage during which the referenced feature or behavior is fully functional and available to all subscribers (limited by pricing tier) for production use.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["general availability","GA"]},"group":{"title":"Group","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003ESet of one or more users. In the Auth0 Authorization Extension, use groups to grant access to many users at a time.\u003C\u002Fp\u003E","short":"\u003Cp\u003ESet of one or more users. In the Auth0 Authorization Extension, use groups to grant access to many users at a time.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["group","groups"]},"id-token":{"title":"ID Token","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003ECredential meant for the client itself, rather than for accessing a resource. It has a fixed format that clients can parse and validate.\u003C\u002Fp\u003E","short":"\u003Cp\u003ECredential meant for the client itself, rather than for accessing a resource.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["id token","id tokens","identity token","identity tokens"]},"idp":{"title":"Identity Provider (IdP)","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EService that stores and manages digital identities. Auth0 supports trusted social, enterprise, and legal identity providers. Auth0 also can function as an identity provider for your applications.\u003C\u002Fp\u003E","short":"\u003Cp\u003EService that stores and manages digital identities.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["identity provider (idp)","identity providers","identity provider","idp","idps","identity providers (idps)"]},"json-web-token":{"title":"JSON Web Token (JWT)","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EOpen, industry standard \u003Ca href=\"https:\u002F\u002Ftools.ietf.org\u002Fhtml\u002Frfc7519\" target=\"_blank\" rel=\"noreferrer noopener\"\u003ERFC 7519\u003C\u002Fa\u003E method for representing claims securely between two parties. At Auth0, ID Tokens are always returned in JWT format, and Access Tokens are often in JWT format. You may decode well-formed JWTs at \u003Ca href=\"https:\u002F\u002Fjwt.io\" target=\"_blank\" rel=\"noreferrer noopener\"\u003EJWT.io\u003C\u002Fa\u003E to view their claims.\u003C\u002Fp\u003E","short":"\u003Cp\u003EStandard ID Token format (and often Access Token format) used to represent claims securely between two parties.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["json web token (jwt)","json web token","json web tokens","jwt","jwts","json web tokens (jwts)"]},"localization":{"title":"Localization","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EAbility to render the New Universal Login experience into a supported language.\u003C\u002Fp\u003E","short":"\u003Cp\u003EAbility to render the New Universal Login experience into a supported language.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["localization"]},"lock":{"title":"Lock","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EAuth0's UI widget for authenticating users. It is ready to go as-is and is the default face of the Classic Universal Login experience. Lock allows you to customize minor behavioral and appearance options, but its primary goal is ease of use.\u003C\u002Fp\u003E","short":"\u003Cp\u003EAuth0's UI widget for authenticating users.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["lock"]},"management-api":{"title":"Management API","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EAuth0's API to manage Auth0 services and perform administrative tasks programatically.\u003C\u002Fp\u003E","short":"\u003Cp\u003EA product to allow customers to perform administrative tasks. \u003C\u002Fp\u003E","automate":true,"automaticTerms":["management api"]},"metadata":{"title":"Metadata","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EInformation users can update, such as preferences or profile settings. Metadata is added to ID tokens and can be stored in user profiles.\u003C\u002Fp\u003E","short":"\u003Cp\u003EUser information stored in user profiles.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["metadata"]},"migration":{"title":"Migration","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EProcess by which a customer moves away from a particular feature or behavior. Migrations should occur during the Deprecation product release stage.\u003C\u002Fp\u003E","short":"\u003Cp\u003EProcess by which a customer moves away from a particular feature or behavior. Migrations should occur during the Deprecation product release stage.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["migration","migrations"]},"multifactor-authentication":{"title":"Multi-factor authentication (MFA)","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EAuthentication process that considers multiple factors. Typically at Auth0, the first factor is the standard username\u002Fpassword exchange, and the second is a code or link via email or SMS, a one-time-password via an app such as Authy or Google Authenticator, or a push notification via a phone app such as Guardian or Duo. Using multiple factors allows your account to remain secure if someone captures one or the other factor--acquires your password or steals your phone, for example.\u003C\u002Fp\u003E","short":"\u003Cp\u003EUser authentication process that uses a factor in addition to username and password such as a code via SMS.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["multi-factor authentication (mfa)","multi-factor authentication","multifactor authentication","mfa"]},"nonce":{"title":"Nonce","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EArbitrary (often random or pseudo-random) number issued in an authentication protocol that can be used to help detect and mitigate replay attacks using old communications. In other words, the nonce is only issued once, so if an attacker attempts to replay a transaction with a different nonce, its false transaction can be detected more easily.\u003C\u002Fp\u003E","short":"\u003Cp\u003EArbitrary number issued once in an authentication protocol to detect and prevent replay attacks.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["nonce","nonces"]},"oath2":{"title":"OAuth 2.0","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EAuthorization framework that defines authorization protocols and workflows. OAuth 2.0 defines roles, authorization grants (or workflows), authorization requests and responses, and token handling. OpenID Connect (OIDC) protocols to verify user identity extends OAuth 2.0.\u003C\u002Fp\u003E","short":"\u003Cp\u003EAuthorization framework that defines authorization protocols and workflows.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["oauth 2.0","oauth"]},"openid":{"title":"OpenID","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EOpen standard for authentication that allows applications to verify users are who they say they are without needing to collect, store, and therefore become liable for a user’s login information.\u003C\u002Fp\u003E","short":"\u003Cp\u003EOpen standard for authentication that allows applications to verify users' identities without collecting and storing login information.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["openid"]},"organizations":{"title":"Organizations","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EAuth0 product that allows B2B customers to categorize end-users and define specific roles, login experience, and access to resources.\u003C\u002Fp\u003E","short":"\u003Cp\u003EAuth0 product that allows B2B customers to categorize end-users and define specific roles.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["organizations","organization"]},"passwordless":{"title":"Passwordless","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EForm of authentication where the first factor is not a password. Instead, it could be a one-time password received by email or SMS, a push notification, or a biometric sensor. Passwordless uses one-time passwords, so users are less susceptible to the typical password-based attacks (e.g., dictionary or credential stuffing) than with traditional username\u002Fpassword logins.\u003C\u002Fp\u003E","short":"\u003Cp\u003EForm of authentication that does not rely on a password as the first factor.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["passwordless"]},"perimeter":{"title":"Perimeter","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003ESet of boundaries that encompass a directory, all of its users, and all of the applications which use the directory. In some implementations, this perimeter is a physical location; in others, it is a set of networks or devices connected via VPN.\u003C\u002Fp\u003E","short":"\u003Cp\u003ESet of boundaries that encompass a directory, all of its users, and all of the applications which use the directory.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["perimeter","perimeters"]},"product-release-stages":{"title":"Product Release Stages","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EPhases that describe how Auth0 stages, releases, and retires product functionality. Product features may not progress through all release stages, and the time in each stage will vary depending on the scope and impact of the feature.\u003C\u002Fp\u003E","short":"\u003Cp\u003EPhases that describe how Auth0 stages, releases, and retires product functionality.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["product release stages","product release stage"]},"public-client":{"title":"Public Client","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EAccording to the OAuth 2.0 protocol, clients (applications) can be classified as either confidential or public depending on whether or not they are able to hold credentials (such as a client ID and secret) securely. Public clients&nbsp;cannot&nbsp;hold credentials securely, so should only use grant types that do not require the use of their client secret. ID Tokens issued to them must be signed asymmetrically using a private key (RS256) and verified using the public key corresponding to the private key used to sign the token.\u003C\u002Fp\u003E","short":"\u003Cp\u003EClient (application) that cannot hold credentials securely. Examples include a native desktop or mobile application and a JavaScript-based client-side web application (such as a single-page app (SPA)).\u003C\u002Fp\u003E","automate":true,"automaticTerms":["public client","public clients"]},"raw-credential":{"title":"Raw Credential","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EShared secret or set of information that is agreed upon between the user and the resource that allow the resource to verify the identity of a user.\u003C\u002Fp\u003E","short":"\u003Cp\u003EShared secret or set of information that is agreed upon between the user and the resource that allow the resource to verify the identity of a user.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["raw credential","raw credentials"]},"refresh-token":{"title":"Refresh Token","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003ESpecial kind of token that can be used to obtain a renewed Access Token. It is useful for renewing expiring Access Tokens without forcing the user to log in again. Using the Refresh Token, you can request a new Access Token at any time until the Refresh Token is blocklisted.\u003C\u002Fp\u003E","short":"\u003Cp\u003EToken used to obtain a renewed Access Token without forcing users to log in again.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["refresh token","refresh tokens"]},"refresh-token-rotation":{"title":"Refresh Token Rotation","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EStrategy of frequently replacing refresh tokens to minimize vulnerability. With refresh token rotation, every time your application exchanges a refresh token to get a new access token, Auth0 also returns a new refresh token.\u003C\u002Fp\u003E","short":"\u003Cp\u003EStrategy of frequently replacing refresh tokens to minimize vulnerability. With refresh token rotation, every time your application exchanges a refresh token to get a new access token, Auth0 also returns a new refresh token.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["refresh token rotation"]},"relying-party":{"title":"Relying Party","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EEntity (such as a service or application) that depends on a third-party identity provider to authenticate a user.\u003C\u002Fp\u003E","short":"\u003Cp\u003EEntity (such as a service or application) that depends on a third-party identity provider to authenticate a user.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["relying party","relying parties"]},"resource-owner":{"title":"Resource Owner","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EEntity (such as a user or application) capable of granting access to a protected resource.\u003C\u002Fp\u003E","short":"\u003Cp\u003EEntity (such as a user or application) capable of granting access to a protected resource.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["resource owner","resource owners"]},"resource-server":{"title":"Resource Server","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EServer hosting protected resources. Resource servers accept and respond to protected resource requests.\u003C\u002Fp\u003E","short":"\u003Cp\u003EServer hosting protected resources. Resource servers accept and respond to protected resource requests.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["resource server","resource servers"]},"role":{"title":"Role","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EAspect of a user’s identity assigned to the user to indicate the level of access they should have to the system. Roles are essentially collections of permissions.\u003C\u002Fp\u003E","short":"\u003Cp\u003EAspect of a user’s identity assigned to the user to give them a certain set of permissions.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["role","roles"]},"scope":{"title":"Scope","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EMechanism that defines the specific actions applications can be allowed to do or information that they can request on a user’s behalf. Often, applications will want to make use of the information that has already been created in an online resource. To do so, the application must ask for authorization to access this information on a user’s behalf. When an app requests permission to access a resource through an authorization server, it uses the Scope parameter to specify what access it needs, and the authorization server uses the Scope parameter to respond with the access that was actually granted.\u003C\u002Fp\u003E","short":"\u003Cp\u003EMechanism that determines actions applications can perform on a user's behalf with information previously created in an online resource.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["scope","scopes"]},"security-assertion-markup-language":{"title":"Security Assertion Markup Language (SAML)","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EXML-based standardized protocol by which two parties can exchange authentication information without the use of a password.\u003C\u002Fp\u003E","short":"\u003Cp\u003EStandardized protocol allowing two parties to exchange authentication information without a password.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["security assertion markup language (saml)","security assertion markup language","saml"]},"security-token":{"title":"Security Token","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EDigitally-signed artifact used to prove that the user was successfully authenticated.\u003C\u002Fp\u003E","short":"\u003Cp\u003EDigitally-signed artifact used to prove that the user was successfully authenticated.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["security token","security tokens"]},"session-cookie":{"title":"Session Cookie","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EEntity emitted by middleware after it establishes that the token it is receiving is signed, valid, and comes from a trusted source (the identity provider). This entity represents the fact that successful authentication occurred with the identity provider. This cookie prevents this process with tokens from needing to be continually repeated, by allowing the user to be considered authenticated as long as the cookie is present.\u003C\u002Fp\u003E","short":"\u003Cp\u003EEntity that, when present, allows the user to be considered authenticated.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["session cookie","session cookies"]},"shadow-account":{"title":"Shadow Account","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EDifficult-to-sustain practice of manually provisioning a user from a local directory separately in a remote directory (essentially creating a copy, or shadow, of the original account) when they need access to remote applications.\u003C\u002Fp\u003E","short":"\u003Cp\u003EDifficult-to-sustain practice of manually provisioning a user from a local directory separately in a remote directory.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["shadow account","shadow accounts"]},"signing-algorithm":{"title":"Signing Algorithm","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EHashing algorithm used to digitally sign tokens to ensure the token has not been tampered with by bad actors.\u003C\u002Fp\u003E","short":"\u003Cp\u003EAlgorithm used to digitally sign tokens to ensure the token has not been tampered with.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["signing algorithm","signing algorithms"]},"single-sign-on":{"title":"Single Sign-On (SSO)","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EService that, after a user logs into one application, automatically logs that user in to other applications, regardless of the platform, technology, or domain the user is using. The user signs in only one time (hence the name of the feature). Similarly, Single Logout (SLO) occurs when, after a user logs out from one application, they are logged out of each application or service where they were logged in. SSO and SLO are possible through the use of sessions.\u003C\u002Fp\u003E","short":"\u003Cp\u003EService that, after a user logs into one applicaton, automatically logs that user in to other applications.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["single sign-on (sso)","single sign-on","single sign on","sso","single signon"]},"subscription":{"title":"Subscription","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EAgreement that defines the features and quotas available for each of your tenants. Auth0 has multiple subscription levels to meet the needs of different developers and organizations.\u003C\u002Fp\u003E","short":"\u003Cp\u003EAgreement that defines the features and quotas available for each of your tenants. Auth0 has multiple subscription levels to meet the needs of different developers and organizations.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["subscription","subscriptions"]},"suspicious-ip-throttling":{"title":"Suspicious IP Throttling","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EForm of attack protection that protects your tenant against suspicious logins targeting too many accounts from a single IP address.\u003C\u002Fp\u003E","short":"\u003Cp\u003EForm of attack protection that protects your tenant against suspicious logins targeting too many accounts from a single IP address.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["suspicious ip throttling"]},"tenant":{"title":"Tenant","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EAt Auth0, a logically-isolated group of users who share common access with specific privileges to a single software instance. No tenant can access the data of another tenant, even though multiple tenants might be running on the same machine. Tenant, in general, is a term borrowed from software multitenant architecture.\u003C\u002Fp\u003E","short":"\u003Cp\u003EAt Auth0, a logically-isolated group of users who share common access with specific privileges to a single software instance. No tenant can access the data of another tenant, even though multiple tenants might be running on the same machine.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["tenant","tenants"]},"token-endpoint":{"title":"Token Endpoint","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EEndpoint on the Authorization Server that is used to programmatically request tokens.\u003C\u002Fp\u003E","short":"\u003Cp\u003EEndpoint on the Authorization Server that is used to programmatically request tokens.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["token endpoint","token endpoints"]},"tokenset":{"title":"Tokenset","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EFor each user's authorized connection, like Google or Microsoft, Token Vault creates a secure container called a tokenset. A tokenset contains the access and refresh tokens needed to call that external provider's APIs on the user's behalf. A tokenset securely stores access and refresh tokens on the Auth0 Authorization Server. \u003C\u002Fp\u003E","short":"\u003Cp\u003EContains the access and refresh tokens needed to call an external provider's APIs.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["tokenset","tokensets"]},"trigger":{"title":"Trigger","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EEvent that automatically invokes an Action when a specific operation, such as a user logging in, occurs at runtime. Some Triggers are executed synchronously, blocking the Flow in which they are involved, and some are executed asynchronously.\u003C\u002Fp\u003E","short":"\u003Cp\u003EEvent that automatically invokes an Action when a specific operation, such as a user logging in, occurs at runtime.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["trigger","triggers"]},"trust":{"title":"Trust","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EResource trusts an identity provider or authority when that resource is willing to believe what the authority says about its users.\u003C\u002Fp\u003E","short":"\u003Cp\u003EResource trusts an identity provider or authority when that resource is willing to believe what the authority says about its users.\u003C\u002Fp\u003E","automate":false,"automaticTerms":["trust","trusts"]},"universal-login":{"title":"Universal Login","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EAuth0’s implementation of the authentication flow, which is the key feature of an Authorization Server. Each time a user needs to prove their identity, your \u003Ca\u003Eapplications\u003C\u002Fa\u003E redirect to Universal Login, and Auth0 will do what’s needed to guarantee the user’s identity.\u003C\u002Fp\u003E","short":"\u003Cp\u003EYour application redirects to Universal Login, hosted on Auth0's Authorization Server, to verify a user's identity.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["universal login"]},"ws-fed":{"title":"Web Service Federation (WS-Fed)","associatedPage":{"url":"\u002Fdocsundefined"},"definition":"\u003Cp\u003EProtocol for managing user identities between systems, domains, and identity providers with established trust using WS-Trust. This protocol is mainly used for Microsoft products and defines policies on how to share federation metadata. \u003C\u002Fp\u003E","short":"\u003Cp\u003EProtocol for managing user identities across domains.\u003C\u002Fp\u003E","automate":true,"automaticTerms":["web service federation (ws-fed)","web service federation","ws-fed"]}},"termLetters":["A","B","C","D","E","F","G","I","J","L","M","N","O","P","R","S","T","U","W"]},"breadcrumbs":[],"sidebarBreadcrumbs":[]}}},"options":{"optimizePromiseCallback":false},"plugins":{"MetricsPlugin":undefined,"DevToolsPlugin":{"actionHistory":[],"enableDebug":false}}},"plugins":{"ServiceProxyPlugin":{}}};</script><script src="https://cdn2.auth0.com/docs/1.14720.0/js/client.e7c596a98371788000d4.bundle.js" data-manual="true"></script><input type="hidden" id="__csrf" value="YVADgnI0-vY9_8qgxiJHwRpZCTxx4cnlQ9Ew"/><div id="footer" data-search-index="false"><div class="sc-bdfBQB jQEcjQ"><div class="s